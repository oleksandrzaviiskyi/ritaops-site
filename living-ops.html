<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RITA · Living Operations</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/css/living-ops.css">
</head>
<body data-state="rest" data-panel="closed">

<div class="tray" id="tray"></div>

<div class="corner-logo">
  <img src="/floating-orange.png" alt="RITA" width="68" height="68">
  <span class="brand">
    <span class="mark">RITA</span>
    <span class="sub">Las Canas Beach Retreat</span>
  </span>
</div>

<div class="layout">
  <div class="cards-area" id="cardsArea">
    <div class="field" id="field"></div>
  </div>
  <div class="rita-panel" id="ritaPanel">
    <div class="panel-head">
      <div class="ptitle">
        <span class="dot"></span>
        <span class="pname">RITA</span>
      </div>
      <button class="close-p" id="closePanel" type="button">×</button>
    </div>
    <div class="chat-area" id="chatArea">
      <div class="msg-rita"><b>Рита:</b> Доброе утро. Открой область слева или задай вопрос — я на связи.</div>
    </div>
    <div class="panel-input">
      <input type="file" id="panelFile" accept=".pdf" style="display:none">
      <div class="inp-wrap">
        <span class="rdot"></span>
        <span class="pdf-badge" id="pdfBadge" style="display:none"></span>
        <textarea id="panelInput" placeholder="Спросить Риту…" autocomplete="off" rows="1"></textarea>
        <button class="attach" id="panelAttach" type="button" title="Прикрепить PDF">📎</button>
        <button class="go" id="panelSend" type="button">→</button>
      </div>
    </div>
  </div>
</div>

<button class="summon" id="summon" type="button">
  <span class="dot"></span>
  <span class="lbl">RITA</span>
</button>

<script src="/js/app.js"></script>

</body>
</html>
