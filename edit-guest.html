<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Edit submission — Las Canas</title>
    <link rel="stylesheet" href="/portal.css" />
  </head>
  <body>
    <header>
      <div class="wrap">
        <h1 id="pageTitle">Edit your submission</h1>
        <p id="pageSubtitle">Las Canas Beach Retreat</p>
        <p id="groupDates" style="margin: 0.35rem 0 0; opacity: 0.9; font-size: 0.9rem"></p>
      </div>
    </header>

    <div id="errorBox" class="error-box wrap" hidden></div>
    <div id="thanksBox" class="card wrap" hidden>
      <h2 style="margin: 0 0 0.5rem; color: var(--ocean)">Saved!</h2>
      <p style="margin: 0">Your submission has been updated.</p>
    </div>

    <form id="guestForm" class="wrap" hidden>
      <section class="card">
        <h2>Your details</h2>
        <div class="grid2">
          <div>
            <label>First name *</label>
            <input name="firstName" required autocomplete="given-name" />
          </div>
          <div>
            <label>Last name *</label>
            <input name="lastName" required autocomplete="family-name" />
          </div>
        </div>
        <div class="grid2">
          <div>
            <label>Email *</label>
            <input name="email" type="email" required autocomplete="email" />
          </div>
          <div>
            <label>Phone *</label>
            <input name="phone" type="tel" required autocomplete="tel" />
          </div>
        </div>
        <div class="grid2">
          <div>
            <label>Adults in your booking</label>
            <input name="adults" type="number" min="0" value="1" />
          </div>
          <div>
            <label>Children</label>
            <input name="children" type="number" min="0" value="0" />
          </div>
        </div>
      </section>

      <section class="card">
        <h2>Flights</h2>
        <div id="flightsList"></div>
        <button type="button" class="btn btn-secondary" id="addFlight">+ Add flight</button>
      </section>

      <section class="card">
        <h2>Dietary restrictions</h2>
        <div id="dietaryList"></div>
        <button type="button" class="btn btn-secondary" id="addDietary">+ Add restriction</button>
      </section>

      <section class="card">
        <h2>Activities</h2>
        <div id="activitiesList"></div>
        <button type="button" class="btn btn-secondary" id="addActivity">+ Add activity</button>
        <label style="margin-top: 1rem; display: flex; align-items: flex-start; gap: 0.5rem">
          <input name="massageRequested" type="checkbox" style="width: auto; margin-top: 0.2rem" />
          <span>I would like a massage (60 min · $60 USD per person)</span>
        </label>
      </section>

      <section class="card">
        <h2>Special requests</h2>
        <textarea name="specialRequests" rows="4" placeholder="Anything we should know…"></textarea>
      </section>

      <button type="submit" class="btn">Save changes</button>
    </form>

    <script src="/guest-form.js"></script>
    <script>
      const pathMatch = location.pathname.match(/\/edit\/([^/]+)/)
      const editToken = pathMatch && decodeURIComponent(pathMatch[1])

      const errorBox = document.getElementById('errorBox')
      const thanksBox = document.getElementById('thanksBox')
      const form = document.getElementById('guestForm')

      GuestForm.bindRepeatUi()

      function showError(msg) {
        errorBox.hidden = false
        errorBox.textContent = msg
        form.hidden = true
        thanksBox.hidden = true
      }

      async function loadSubmission() {
        if (!editToken) {
          showError('Invalid edit link.')
          return
        }
        const res = await fetch(`/api/edit-guest?token=${encodeURIComponent(editToken)}`)
        const json = await res.json()
        if (!res.ok) {
          showError(json.error || 'Could not load your submission')
          return
        }
        const g = json.group || {}
        const s = json.submission
        document.getElementById('pageTitle').textContent =
          `Edit · ${g.groupName || 'your group'}`
        const dates =
          g.checkIn || g.checkOut
            ? `${g.checkIn || '?'} — ${g.checkOut || '?'}`
            : ''
        document.getElementById('groupDates').textContent = dates ? `Stay dates: ${dates}` : ''
        GuestForm.fillContactFields(form, s)
        errorBox.hidden = true
        form.hidden = false
      }

      form.addEventListener('submit', async (e) => {
        e.preventDefault()
        const contact = GuestForm.readContactFields(form)
        if (!contact.firstName || !contact.lastName || !contact.email || !contact.phone) {
          alert('Please fill in first name, last name, email, and phone.')
          return
        }
        const data = GuestForm.buildSubmissionPayload(form, {token: editToken})
        const res = await fetch('/api/edit-guest', {
          method: 'POST',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify(data)
        })
        const json = await res.json()
        if (!res.ok) {
          alert(json.error || 'Save failed')
          return
        }
        form.hidden = true
        thanksBox.hidden = false
        window.scrollTo(0, 0)
      })

      loadSubmission()
    </script>
  </body>
</html>
