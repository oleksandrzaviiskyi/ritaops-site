[build]
  command = "cd living-ops && npm install && npm run build"
  publish = "."
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION = "20"

# Dashboard (React app)
[[redirects]]
  from = "/living-ops"
  to = "/living-ops-app/index.html"
  status = 200

[[redirects]]
  from = "/living-ops/*"
  to = "/living-ops-app/index.html"
  status = 200

# Group portal pages
[[redirects]]
  from = "/ops/group"
  to = "/ops-group.html"
  status = 200

[[redirects]]
  from = "/group-portal/:slug"
  to = "/dashboard.html"
  status = 200

[[redirects]]
  from = "/portal/:slug"
  to = "/portal.html"
  status = 200

[[redirects]]
  from = "/guest/:slug"
  to = "/guest.html"
  status = 200

[[redirects]]
  from = "/groups"
  to = "/portals-list.html"
  status = 200

[[redirects]]
  from = "/api/poster-sync"
  to = "/.netlify/functions/poster-sync"
  status = 200
  force = true

[[redirects]]
  from = "/api/ops-pulse"
