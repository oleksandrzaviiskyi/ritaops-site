[build]
  functions = "netlify/functions"

[[redirects]]
  from = "/portal/*"
  to = "/organizer.html"
  status = 200

[[redirects]]
  from = "/dashboard"
  to = "/dashboard.html"
  status = 200

[[redirects]]
  from = "/ops/group"
  to = "/ops-group.html"
  status = 200

[[redirects]]
  from = "/api/portal"
  to = "/.netlify/functions/portal"
  status = 200

[[redirects]]
  from = "/api/portals"
  to = "/.netlify/functions/portals"
  status = 200

[[redirects]]
  from = "/api/ops-portal"
  to = "/.netlify/functions/ops-portal"
  status = 200
