<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>RitaOps — Группа</title>
    <link rel="stylesheet" href="/ritaops-dashboard.css" />
    <script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>
  </head>
  <body class="ops">
    <div class="ops-layout">
      <aside class="ops-sidebar">
        <div class="ops-brand">
          <div class="ops-brand-icon">☀</div>
          <div>
            <h1>RitaOps</h1>
            <p id="propertyName">Las Canas Beach Retreat</p>
          </div>
        </div>
        <nav>
          <ul class="ops-nav" id="sideNav">
            <li><a href="/dashboard" id="navBack">← Все группы</a></li>
            <li><a href="#overview" class="active">📊 Обзор</a></li>
            <li><a href="#flights">✈️ Рейсы и трансфер</a></li>
            <li><a href="#dining">🍽 Питание</a></li>
            <li><a href="#activities">🌴 Активности</a></li>
            <li><a href="#notes">📝 Пожелания</a></li>
          </ul>
        </nav>
        <div class="ops-help" id="organizerLinkBox" hidden>
          <strong>Ссылка организатору</strong>
          <p style="font-size:0.75rem;word-break:break-all;margin:0.5rem 0" id="organizerUrl"></p>
          <button type="button" class="ops-btn" id="copyOrganizer">Копировать</button>
          <hr style="border:none;border-top:1px solid var(--border);margin:1rem 0" />
          <strong>Guest link</strong>
          <p style="font-size:0.75rem;word-break:break-all;margin:0.5rem 0" id="guestUrl"></p>
          <button type="button" class="ops-btn" id="copyGuest">Копировать для гостей</button>
        </div>
      </aside>

      <main class="ops-main">
        <header class="ops-topbar">
          <div class="ops-topbar-left">
            <span class="title">Карточка группы</span>
            <div class="ops-topbar-actions">
              <button type="button" class="ops-toolbar-btn" id="btnPrintAll">🖨 Print All</button>
              <button type="button" class="ops-toolbar-btn" id="btnExportExcel">⬇ Export Excel</button>
            </div>
          </div>
          <a href="/dashboard" id="topBack" class="ops-topbar-back">← Группы</a>
        </header>

        <div class="ops-content" id="content">
          <p style="color:var(--muted)">Загрузка…</p>
        </div>
      </main>
    </div>

    <div id="print-area" aria-hidden="true"></div>

    <script>
      function getPortalData() {
        return window.portalData || null
      }

      function getGuestSubmissions() {
        return window.guestSubmissions || []
      }

      const SOURCE_ORGANIZER = 'Organizer'

      function mergeFlights(portal, guestSubmissions) {
        const rows = []
        ;(Array.isArray(portal?.flights) ? portal.flights : []).forEach((f) => {
          rows.push({guest: SOURCE_ORGANIZER, ...f})
        })
        ;(Array.isArray(guestSubmissions) ? guestSubmissions : []).forEach((g) => {
          const guest = g.guestName || 'Guest'
          ;(Array.isArray(g.flights) ? g.flights : []).forEach((f) => {
            rows.push({guest, ...f})
          })
        })
        return rows
      }

      function mergeDietary(portal, guestSubmissions) {
        const rows = []
        ;(Array.isArray(portal?.dietaryRestrictions) ? portal.dietaryRestrictions : []).forEach((d) => {
          rows.push({guest: SOURCE_ORGANIZER, ...d})
        })
        ;(Array.isArray(guestSubmissions) ? guestSubmissions : []).forEach((g) => {
          const source = g.guestName || 'Guest'
          ;(Array.isArray(g.dietaryRestrictions) ? g.dietaryRestrictions : []).forEach((d) => {
            rows.push({guest: source, ...d})
          })
        })
        return rows
      }

      function mergeActivities(portal, guestSubmissions) {
        const rows = []
        ;(Array.isArray(portal?.activities) ? portal.activities : []).forEach((a) => {
          rows.push({guest: SOURCE_ORGANIZER, ...a})
        })
        ;(Array.isArray(guestSubmissions) ? guestSubmissions : []).forEach((g) => {
          const guest = g.guestName || 'Guest'
          ;(Array.isArray(g.activities) ? g.activities : []).forEach((a) => {
            rows.push({guest, ...a})
          })
        })
        return rows
      }

      const PROGRESS_WEIGHTS = {core: 30, travel: 25, food: 25, program: 10, notes: 10}

      function progressWithGuests(portal, guestSubmissions) {
        const base = portal.progressSections || {}
        const sections = {...base}
        const subs = Array.isArray(guestSubmissions) ? guestSubmissions : []
        if (subs.length) sections.travel = 100

        const percent = Math.min(
          100,
          Math.round(
            (sections.core * PROGRESS_WEIGHTS.core +
              sections.travel * PROGRESS_WEIGHTS.travel +
              sections.food * PROGRESS_WEIGHTS.food +
              sections.program * PROGRESS_WEIGHTS.program +
              sections.notes * PROGRESS_WEIGHTS.notes) /
              100
          )
        )
        return {sections, percent}
      }

      function flightDirectionLabel(direction) {
        if (direction === 'arrival') return 'Arrival'
        if (direction === 'departure') return 'Departure'
        return '—'
      }

      const PRINT_SECTION_TITLES = {
        flights: 'Flights & Transport',
        dining: 'Nutrition',
        activities: 'Activities',
        core: 'Basic Data',
        notes: 'Wishes'
      }

      const PRINT_ALL_ORDER = ['core', 'flights', 'dining', 'activities', 'notes']

      const EVENT_TYPE_LABELS = {
        yoga_retreat: 'Yoga Retreat',
        wellness_retreat: 'Wellness Retreat',
        wedding: 'Wedding',
        family_reunion: 'Family Reunion',
        corporate_retreat: 'Corporate Retreat',
        surf_camp: 'Surf Camp',
        private_vacation: 'Private Vacation'
      }

      const RESTRICTION_LABELS = {
        vegetarian: 'Vegetarian',
        vegan: 'Vegan',
        gluten_free: 'Gluten-free',
        lactose_free: 'Lactose-free',
        allergy: 'Allergy',
        halal: 'Halal',
        other: 'Other'
      }

      const ACTIVITY_LABELS = {
        gri_gri: 'Laguna Gri Gri',
        playa_grande: 'Playa Grande',
        kite_surfing: 'Kite Surfing',
        horse_riding: 'Horse Riding',
        cultural_tour: 'Cultural Tour',
        yoga: 'Yoga',
        massage: 'Massage',
        other: 'Other'
      }

      const SECTIONS = [
        {
          id: 'flights',
          printId: 'flights',
          icon: '✈️',
          color: '#4a90c4',
          title: 'Рейсы и трансфер',
          desc: 'Прилёты, отлёты и трансфер от аэропорта.',
          key: 'travel',
          href: '#flights'
        },
        {
          id: 'dining',
          printId: 'dining',
          icon: '🍽',
          color: '#3d8f5a',
          title: 'Питание',
          desc: 'Меню по дням и диетические ограничения.',
          key: 'food',
          href: '#dining'
        },
        {
          id: 'activities',
          printId: 'activities',
          icon: '🌴',
          color: '#d98a2b',
          title: 'Активности',
          desc: 'Экскурсии и программа группы.',
          key: 'program',
          href: '#activities'
        },
        {
          id: 'core',
          printId: 'core',
          icon: '📋',
          color: '#7b68a6',
          title: 'Основные данные',
          desc: 'Даты, гости, тип мероприятия.',
          key: 'core',
          href: '#overview'
        },
        {
          id: 'notes',
          printId: 'notes',
          icon: '💬',
          color: '#c45c3e',
          title: 'Пожелания',
          desc: 'Специальные запросы группы.',
          key: 'notes',
          href: '#notes'
        }
      ]

      function staffKey() {
        const fromUrl = new URLSearchParams(location.search).get('key')
        if (fromUrl) {
          sessionStorage.setItem('ritaops_staff_key', fromUrl)
          return fromUrl
        }
        return sessionStorage.getItem('ritaops_staff_key') || ''
      }

      function escapeHtml(s) {
        return String(s ?? '')
          .replace(/&/g, '&amp;')
          .replace(/</g, '&lt;')
          .replace(/>/g, '&gt;')
      }

      function nightsBetween(a, b) {
        if (!a || !b) return null
        const n = Math.round((new Date(b) - new Date(a)) / 86400000)
        return n > 0 ? n : null
      }

      function ringStyle(pct) {
        const p = Math.min(100, Math.max(0, pct))
        return `background: conic-gradient(var(--accent) ${p * 3.6}deg, var(--border) 0)`
      }

      function formatGuestDietary(items) {
        const list = Array.isArray(items) ? items : []
        if (!list.length) return '—'
        return list
          .map((d) => {
            const label = RESTRICTION_LABELS[d.restriction] || d.restriction || '—'
            const detail = d.details ? ` (${d.details})` : ''
            return `${d.guestName ? d.guestName + ': ' : ''}${label}${detail}`
          })
          .join('; ')
      }

      function formatGuestActivities(items) {
        const list = Array.isArray(items) ? items : []
        if (!list.length) return '—'
        return list
          .map((a) => {
            const label = ACTIVITY_LABELS[a.activity] || a.activity || '—'
            const date = a.date ? ` · ${a.date}` : ''
            const n = a.guests != null ? ` (${a.guests})` : ''
            return `${label}${date}${n}`
          })
          .join('; ')
      }

      function formatGuestMassage(g) {
        if (g.massageRequested) return 'Yes'
        const acts = Array.isArray(g.activities) ? g.activities : []
        if (acts.some((a) => a.activity === 'massage')) return 'Yes'
        return '—'
      }

      function formatSubmittedAt(iso) {
        if (!iso) return '—'
        const d = new Date(iso)
        if (Number.isNaN(d.getTime())) return '—'
        return d.toLocaleString('en-GB', {
          day: '2-digit',
          month: 'short',
          year: 'numeric',
          hour: '2-digit',
          minute: '2-digit'
        })
      }

      function renderMergedTable(headers, rows) {
        if (!rows.length) {
          return '<p style="margin:0;color:var(--muted);font-size:0.88rem">Нет данных</p>'
        }
        const head = headers.map((h) => `<th>${escapeHtml(h)}</th>`).join('')
        const body = rows
          .map((row) => `<tr>${row.map((c) => `<td>${escapeHtml(c)}</td>`).join('')}</tr>`)
          .join('')
        return `<div class="ops-data-table-wrap"><table class="ops-data-table"><thead><tr>${head}</tr></thead><tbody>${body}</tbody></table></div>`
      }

      function renderMergedSectionBlocks(portal, guestSubmissions) {
        const subs = guestSubmissions || []
        const flights = mergeFlights(portal, subs)
        const flightRows = flights.map((f) => [
          f.guest,
          flightDirectionLabel(f.direction),
          f.flightNumber || '—',
          f.date || '—',
          f.time || '—',
          f.airport || '—',
          f.passengers != null ? String(f.passengers) : '—'
        ])
        const transferNote =
          portal.transferNeeded === true
            ? '<p style="margin:0.75rem 0 0;font-size:0.88rem"><strong>Трансфер:</strong> требуется</p>'
            : portal.transferNeeded === false
              ? '<p style="margin:0.75rem 0 0;font-size:0.88rem"><strong>Трансфер:</strong> не требуется</p>'
              : ''

        const dietary = mergeDietary(portal, subs)
        const dietRows = dietary.map((d) => [
          d.guest,
          d.guestName || '—',
          RESTRICTION_LABELS[d.restriction] || d.restriction || '—',
          d.details || '—'
        ])
        const menu = Array.isArray(portal.menuPlan) ? portal.menuPlan : []
        const menuRows = menu.map((m) => [
          m.date || '—',
          (m.breakfast || '—').replace(/\n/g, ' '),
          (m.lunch || '—').replace(/\n/g, ' '),
          (m.dinner || '—').replace(/\n/g, ' ')
        ])

        const acts = mergeActivities(portal, subs)
        const actRows = acts.map((a) => [
          a.guest,
          ACTIVITY_LABELS[a.activity] || a.activity || '—',
          a.date || '—',
          a.guests != null ? String(a.guests) : '—',
          a.notes || '—'
        ])

        return `
          <div class="ops-merged-sections" id="merged-sections" hidden>
            <section class="ops-panel ops-merged-block" id="flights" hidden>
              <h3>✈️ Рейсы и трансфер</h3>
              ${renderMergedTable(
                ['Guest', 'Direction', 'Flight №', 'Date', 'Time', 'Airport', 'Passengers'],
                flightRows
              )}
              ${transferNote}
            </section>
            <section class="ops-panel ops-merged-block" id="dining" hidden>
              <h3>🍽 Питание</h3>
              <h4 style="margin:1rem 0 0.5rem;font-size:0.9rem;color:var(--muted)">Диетические ограничения</h4>
              ${renderMergedTable(['Guest', 'Name', 'Restriction', 'Details'], dietRows)}
              <h4 style="margin:1.25rem 0 0.5rem;font-size:0.9rem;color:var(--muted)">Меню по дням (организатор)</h4>
              ${renderMergedTable(['Date', 'Breakfast', 'Lunch', 'Dinner'], menuRows)}
            </section>
            <section class="ops-panel ops-merged-block" id="activities" hidden>
              <h3>🌴 Активности</h3>
              ${renderMergedTable(
                ['Guest', 'Activity', 'Date', 'Participants', 'Notes'],
                actRows
              )}
            </section>
          </div>`
      }

      function renderGuestSubmissions(guests) {
        const list = Array.isArray(guests) ? guests : []
        const count = list.length
        if (!count) {
          return `
          <section class="ops-guest-section" id="guest-submissions">
            <h3>Guest Submissions (${count})</h3>
            <p class="muted" style="margin:0;color:var(--muted)">No guest forms submitted yet.</p>
          </section>`
        }

        const rows = list
          .map((g) => {
            const flights = Array.isArray(g.flights) ? g.flights.length : 0
            return `<tr>
              <td>${escapeHtml(g.guestName || '—')}</td>
              <td>${g.adults != null ? escapeHtml(g.adults) : '—'}</td>
              <td>${g.children != null ? escapeHtml(g.children) : '—'}</td>
              <td>${flights}</td>
              <td>${escapeHtml(formatGuestDietary(g.dietaryRestrictions))}</td>
              <td>${escapeHtml(formatGuestActivities(g.activities))}</td>
              <td>${escapeHtml(formatGuestMassage(g))}</td>
              <td>${escapeHtml(formatSubmittedAt(g.submittedAt))}</td>
            </tr>`
          })
          .join('')

        return `
          <section class="ops-guest-section" id="guest-submissions">
            <h3>Guest Submissions (${count})</h3>
            <div class="ops-data-table-wrap">
              <table class="ops-data-table">
                <thead>
                  <tr>
                    <th>Guest name</th>
                    <th>Adults</th>
                    <th>Children</th>
                    <th>Flights count</th>
                    <th>Dietary restrictions</th>
                    <th>Activities</th>
                    <th>Massage</th>
                    <th>Submitted at</th>
                  </tr>
                </thead>
                <tbody>${rows}</tbody>
              </table>
            </div>
          </section>`
      }

      function printTable(headers, rows) {
        if (!rows.length) {
          return '<p class="empty">No data</p>'
        }
        const head = headers.map((h) => `<th>${escapeHtml(h)}</th>`).join('')
        const body = rows
          .map((row) => `<tr>${row.map((c) => `<td>${escapeHtml(c)}</td>`).join('')}</tr>`)
          .join('')
        return `<table><thead><tr>${head}</tr></thead><tbody>${body}</tbody></table>`
      }

      function buildPrintBody(sectionId, p, guestSubmissions) {
        const subs = guestSubmissions ?? getGuestSubmissions()

        if (sectionId === 'flights') {
          const flights = mergeFlights(p, subs)
          const rows = flights.map((f) => [
            f.guest || '—',
            flightDirectionLabel(f.direction),
            f.flightNumber || '—',
            f.date || '—',
            f.time || '—',
            f.airport || '—',
            f.passengers != null ? String(f.passengers) : '—'
          ])
          const transfer =
            p.transferNeeded === true
              ? '<p><strong>Airport transfer:</strong> Required</p>'
              : p.transferNeeded === false
                ? '<p><strong>Airport transfer:</strong> Not required</p>'
                : ''
          return (
            printTable(
              ['Guest', 'Direction', 'Flight №', 'Date', 'Time', 'Airport', 'Passengers'],
              rows
            ) + transfer
          )
        }

        if (sectionId === 'dining') {
          const dietary = mergeDietary(p, subs)
          const dietRows = dietary.map((d) => [
            d.guest || '—',
            d.guestName || '—',
            RESTRICTION_LABELS[d.restriction] || d.restriction || '—',
            d.details || '—'
          ])
          const menu = Array.isArray(p.menuPlan) ? p.menuPlan : []
          const menuRows = menu.map((m) => [
            m.date || '—',
            (m.breakfast || '—').replace(/\n/g, ' '),
            (m.lunch || '—').replace(/\n/g, ' '),
            (m.dinner || '—').replace(/\n/g, ' ')
          ])
          return (
            '<h2>Dietary restrictions</h2>' +
            printTable(['Guest', 'Name', 'Restriction', 'Details'], dietRows) +
            '<h2>Menu by day</h2>' +
            printTable(['Date', 'Breakfast', 'Lunch', 'Dinner'], menuRows)
          )
        }

        if (sectionId === 'activities') {
          const acts = mergeActivities(p, subs)
          const rows = acts.map((a) => [
            a.guest || '—',
            ACTIVITY_LABELS[a.activity] || a.activity || '—',
            a.date || '—',
            a.guests != null ? String(a.guests) : '—',
            a.notes || '—'
          ])
          return printTable(['Guest', 'Activity', 'Date', 'Participants', 'Notes'], rows)
        }

        if (sectionId === 'core') {
          const nights = nightsBetween(p.checkIn, p.checkOut)
          const dates =
            p.checkIn || p.checkOut
              ? `${p.checkIn || '—'} — ${p.checkOut || '—'}${nights ? ` (${nights} nights)` : ''}`
              : '—'
          const guests =
            p.totalGuests != null
              ? `${p.totalGuests} total (${p.adults ?? '—'} adults, ${p.children ?? 0} children)`
              : '—'
          return `<table class="kv"><tbody>
            <tr><th>Group name</th><td>${escapeHtml(p.groupName || '—')}</td></tr>
            <tr><th>Dates</th><td>${escapeHtml(dates)}</td></tr>
            <tr><th>Guests</th><td>${escapeHtml(guests)}</td></tr>
            <tr><th>Event type</th><td>${escapeHtml(EVENT_TYPE_LABELS[p.eventType] || p.eventType || '—')}</td></tr>
            <tr><th>Organizer email</th><td>${escapeHtml(p.organizerEmail || '—')}</td></tr>
          </tbody></table>`
        }

        if (sectionId === 'notes') {
          const text = (p.specialRequests || '').trim()
          return text
            ? `<div class="text-block">${escapeHtml(text).replace(/\n/g, '<br>')}</div>`
            : '<p class="empty">No special requests</p>'
        }

        return '<p class="empty">Unknown section</p>'
      }

      function requirePortalData() {
        const p = getPortalData()
        if (!p || (!p.groupName && !p.slug)) {
          alert('Data not loaded yet')
          return null
        }
        return p
      }

      const MERGED_PANEL_IDS = ['flights', 'dining', 'activities']

      function hideMergedPanels() {
        MERGED_PANEL_IDS.forEach((id) => {
          const el = document.getElementById(id)
          if (el) el.hidden = true
        })
        const wrap = document.getElementById('merged-sections')
        if (wrap) wrap.hidden = true
      }

      function showMergedPanel(sectionId) {
        if (!MERGED_PANEL_IDS.includes(sectionId)) return
        hideMergedPanels()
        const el = document.getElementById(sectionId)
        const wrap = document.getElementById('merged-sections')
        if (wrap) wrap.hidden = false
        if (el) {
          el.hidden = false
          el.scrollIntoView({behavior: 'smooth', block: 'start'})
        }
      }

      function toggleMergedPanel(sectionId) {
        if (!MERGED_PANEL_IDS.includes(sectionId)) return
        const el = document.getElementById(sectionId)
        if (!el) return
        if (!el.hidden) {
          hideMergedPanels()
          return
        }
        showMergedPanel(sectionId)
      }

      function runPrint(html, onAfterPrint) {
        const area = document.getElementById('print-area')
        area.innerHTML = html
        window.addEventListener(
          'afterprint',
          () => {
            area.innerHTML = ''
            onAfterPrint?.()
          },
          {once: true}
        )
        window.print()
      }

      function printSection(sectionId) {
        const p = requirePortalData()
        if (!p) return

        const showOnScreen = MERGED_PANEL_IDS.includes(sectionId)
        if (showOnScreen) showMergedPanel(sectionId)

        const property = p.property || 'Las Canas Beach Retreat'
        const groupName = p.groupName || p.slug || 'Group'
        const sectionTitle = PRINT_SECTION_TITLES[sectionId] || sectionId
        const header = `RitaOps · ${property} · ${groupName} · ${sectionTitle}`
        const subs = getGuestSubmissions()
        const body = buildPrintBody(sectionId, p, subs)

        runPrint(
          `<div class="print-sheet"><h1 class="print-title">${escapeHtml(header)}</h1>${body}</div>`,
          showOnScreen ? hideMergedPanels : undefined
        )
      }

      function printAll() {
        const p = requirePortalData()
        if (!p) return

        const subs = getGuestSubmissions()
        const property = p.property || 'Las Canas Beach Retreat'
        const groupName = p.groupName || p.slug || 'Group'
        const mainTitle = `RitaOps · ${property} · ${groupName} · Full Report`

        const sectionsHtml = PRINT_ALL_ORDER.map((id) => {
          const title = PRINT_SECTION_TITLES[id]
          const body = buildPrintBody(id, p, subs)
          return `<section class="print-section-block"><h2 class="print-section-heading">${escapeHtml(title)}</h2>${body}</section>`
        }).join('')

        runPrint(
          `<div class="print-sheet"><h1 class="print-title">${escapeHtml(mainTitle)}</h1>${sectionsHtml}</div>`
        )
      }

      function exportExcel() {
        const p = requirePortalData()
        if (!p) return

        if (typeof XLSX === 'undefined') {
          alert('Excel library not loaded. Check your connection.')
          return
        }

        const wb = XLSX.utils.book_new()
        const nights = nightsBetween(p.checkIn, p.checkOut)
        const dates =
          p.checkIn || p.checkOut
            ? `${p.checkIn || ''} — ${p.checkOut || ''}${nights ? ` (${nights} nights)` : ''}`
            : ''
        const guests =
          p.totalGuests != null
            ? `${p.totalGuests} (${p.adults ?? '—'} adults, ${p.children ?? 0} children)`
            : ''

        XLSX.utils.book_append_sheet(
          wb,
          XLSX.utils.aoa_to_sheet([
            ['Group name', p.groupName || ''],
            ['Dates', dates],
            ['Guests', guests],
            ['Event type', EVENT_TYPE_LABELS[p.eventType] || p.eventType || ''],
            ['Organizer email', p.organizerEmail || '']
          ]),
          'Overview'
        )

        const subs = getGuestSubmissions()
        const flights = mergeFlights(p, subs)
        XLSX.utils.book_append_sheet(
          wb,
          XLSX.utils.aoa_to_sheet([
            ['Guest', 'Direction', 'Flight №', 'Date', 'Time', 'Airport', 'Passengers'],
            ...flights.map((f) => [
              f.guest || '',
              flightDirectionLabel(f.direction),
              f.flightNumber || '',
              f.date || '',
              f.time || '',
              f.airport || '',
              f.passengers != null ? f.passengers : ''
            ]),
            [],
            ['Airport transfer', p.transferNeeded === true ? 'Required' : p.transferNeeded === false ? 'Not required' : '']
          ]),
          'Flights'
        )

        const dietary = mergeDietary(p, subs)
        const menu = Array.isArray(p.menuPlan) ? p.menuPlan : []
        const nutritionRows = [
          ['Dietary restrictions'],
          ['Guest', 'Name', 'Restriction', 'Details'],
          ...dietary.map((d) => [
            d.guest || '',
            d.guestName || '',
            RESTRICTION_LABELS[d.restriction] || d.restriction || '',
            d.details || ''
          ]),
          [],
          ['Menu by day'],
          ['Date', 'Breakfast', 'Lunch', 'Dinner'],
          ...menu.map((m) => [
            m.date || '',
            m.breakfast || '',
            m.lunch || '',
            m.dinner || ''
          ])
        ]
        XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(nutritionRows), 'Nutrition')

        const acts = mergeActivities(p, subs)
        XLSX.utils.book_append_sheet(
          wb,
          XLSX.utils.aoa_to_sheet([
            ['Guest', 'Activity', 'Date', 'Participants', 'Notes'],
            ...acts.map((a) => [
              a.guest || '',
              ACTIVITY_LABELS[a.activity] || a.activity || '',
              a.date || '',
              a.guests != null ? a.guests : '',
              a.notes || ''
            ])
          ]),
          'Activities'
        )

        XLSX.utils.book_append_sheet(
          wb,
          XLSX.utils.aoa_to_sheet([
            ['Special Requests'],
            [(p.specialRequests || '').trim() || '—']
          ]),
          'Wishes'
        )

        const slug = (p.slug || p.groupName || 'group')
          .replace(/[^a-z0-9-_]+/gi, '-')
          .replace(/^-|-$/g, '')
          .toLowerCase()
        XLSX.writeFile(wb, `ritaops-${slug || 'group'}-report.xlsx`)
      }

      function render(p, guests) {
        window.portalData = p
        window.guestSubmissions = guests || []
        const slug = new URLSearchParams(location.search).get('slug')
        const key = staffKey()
        const backHref = key ? `/dashboard?key=${encodeURIComponent(key)}` : '/dashboard'
        document.getElementById('navBack').href = backHref
        document.getElementById('topBack').href = backHref

        const guestList = guests || []
        const {sections: sec, percent: pct} = progressWithGuests(p, guestList)
        const nights = nightsBetween(p.checkIn, p.checkOut)
        const updated = p.lastPortalSaveAt
          ? new Date(p.lastPortalSaveAt).toLocaleDateString('ru-RU')
          : '—'

        const joinUrl = p.organizerJoinUrl || p.organizerPortalUrl
        const guestUrl =
          p.guestFormUrl ||
          (p.groupSlug || p.slug
            ? `${location.origin}/guest/${encodeURIComponent(p.groupSlug || p.slug)}`
            : null)
        if (joinUrl || guestUrl) {
          document.getElementById('organizerLinkBox').hidden = false
          if (joinUrl) {
            document.getElementById('organizerUrl').textContent = joinUrl
            document.getElementById('copyOrganizer').onclick = () => {
              navigator.clipboard?.writeText(joinUrl)
              alert('Ссылка скопирована')
            }
          } else {
            document.getElementById('organizerUrl').textContent = '—'
            document.getElementById('copyOrganizer').disabled = true
          }
          if (guestUrl) {
            document.getElementById('guestUrl').textContent = guestUrl
            document.getElementById('copyGuest').onclick = () => {
              navigator.clipboard?.writeText(guestUrl)
              alert('Guest link copied')
            }
          }
        }

        const cards = SECTIONS.map((s) => {
          const sp = sec[s.key] ?? 0
          const hasMerged = MERGED_PANEL_IDS.includes(s.id)
          const viewBtn = hasMerged
            ? `<button type="button" class="ops-btn" data-view="${s.id}">View</button>`
            : ''
          return `
          <article class="ops-section-card" id="card-${s.id}">
            <div class="icon" style="background:${s.color}22;color:${s.color}">${s.icon}</div>
            <h4>${escapeHtml(s.title)}</h4>
            <p>${escapeHtml(s.desc)}</p>
            <div class="ops-ring" style="${ringStyle(sp)}">${sp}%</div>
            <div class="ops-card-actions">
              <a class="ops-btn" href="${joinUrl || p.organizerPortalUrl || '#'}" ${joinUrl || p.organizerPortalUrl ? 'target="_blank"' : ''}>Открыть в портале</a>
              ${viewBtn}
              <button type="button" class="ops-btn ops-btn-print" data-print="${s.printId}">🖨 Print</button>
            </div>
          </article>`
        }).join('')

        const reminders = (p.reminders || [])
          .map((r) => `<li>${escapeHtml(r.text)}</li>`)
          .join('')

        document.getElementById('content').innerHTML = `
          <section class="ops-hero" id="overview">
            <div class="ops-hero-bg"></div>
            <div class="ops-hero-inner">
              <div>
                <div class="ops-hero-kicker">RITAOPS · ${escapeHtml(p.property || 'Las Canas')}</div>
                <h2>${escapeHtml(p.groupName)}</h2>
                <div class="ops-hero-meta">
                  <span>📅 ${escapeHtml(p.checkIn || '?')} — ${escapeHtml(p.checkOut || '?')}${nights ? ` (${nights} ночей)` : ''}</span>
                  <span>👥 ${p.totalGuests ?? '—'} гостей · ${p.adults ?? '—'} взр.${p.children ? ` · ${p.children} дет.` : ''}</span>
                </div>
              </div>
              <div class="ops-progress-card">
                <h3>Прогресс группы</h3>
                <p class="ops-progress-pct">${pct}%</p>
                <div class="ops-progress-bar"><span style="width:${pct}%"></span></div>
                <p style="margin:0;font-size:0.78rem;color:var(--muted)">Обновлено: ${updated}</p>
              </div>
            </div>
          </section>

          <p style="margin:1rem 0;color:var(--muted)">Подразделения видят статус по блокам. Организатор заполняет данные в своём портале.</p>

          <div class="ops-grid-cards">${cards}</div>

          ${renderMergedSectionBlocks(p, guestList)}

          <div class="ops-bottom">
            <div class="ops-panel">
              <h3>Сводка группы</h3>
              <div class="ops-stats">
                <div><strong>${p.totalGuests ?? '—'}</strong><span>Гостей</span></div>
                <div><strong>${p.adults ?? '—'}</strong><span>Взрослых</span></div>
                <div><strong>${p.children ?? 0}</strong><span>Детей</span></div>
                <div><strong>${nights ?? '—'}</strong><span>Ночей</span></div>
              </div>
            </div>
            <div class="ops-panel">
              <h3>Напоминания RitaOps</h3>
              <ul class="ops-reminders">${reminders || '<li>Нет срочных пунктов</li>'}</ul>
            </div>
          </div>

          ${renderGuestSubmissions(guests)}`

      }

      document.getElementById('btnPrintAll').addEventListener('click', printAll)
      document.getElementById('btnExportExcel').addEventListener('click', exportExcel)

      document.getElementById('sideNav')?.addEventListener('click', (e) => {
        const link = e.target.closest('a[href^="#"]')
        if (!link) return
        const id = link.getAttribute('href').slice(1)
        if (MERGED_PANEL_IDS.includes(id)) {
          e.preventDefault()
          showMergedPanel(id)
        }
      })

      document.addEventListener('click', (e) => {
        const viewBtn = e.target.closest('[data-view]')
        if (viewBtn) {
          e.preventDefault()
          toggleMergedPanel(viewBtn.getAttribute('data-view'))
          return
        }
        const printBtn = e.target.closest('[data-print]')
        if (!printBtn) return
        e.preventDefault()
        printSection(printBtn.getAttribute('data-print'))
      })

      async function load() {
        const slug = new URLSearchParams(location.search).get('slug')
        if (!slug) {
          document.getElementById('content').innerHTML =
            '<p>Укажите slug в URL: /ops/group?slug=…</p>'
          return
        }
        const key = staffKey()
        const qs = new URLSearchParams({slug})
        if (key) qs.set('key', key)
        const res = await fetch(`/api/ops-portal?${qs}`)
        const json = await res.json()
        if (!res.ok) throw new Error(json.error || res.statusText)
        window.portalData = json.portal
        render(json.portal, json.guests)
      }

      load().catch((e) => {
        document.getElementById('content').innerHTML = `<p style="color:var(--warn)">${escapeHtml(e.message)}</p>`
      })
    </script>
  </body>
</html>
