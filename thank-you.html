<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Thank you — RITA</title>
<style>
:root{
  --bg1:#fffdf7;
  --bg2:#fff4df;
  --bg3:#ffdca6;
  --ink:#111111;
  --muted:#5f594f;
  --line:rgba(40,30,18,.045);
}
*{box-sizing:border-box}
html,body{min-height:100%}
body{
  margin:0;
  font-family:Inter,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
  color:var(--ink);
  background:
    radial-gradient(circle at 50% 32%,rgba(255,255,255,.90),transparent 26%),
    radial-gradient(circle at 48% 54%,rgba(255,145,22,.24),transparent 34%),
    linear-gradient(180deg,var(--bg1) 0%,var(--bg2) 48%,var(--bg3) 100%);
}
body::before{
  content:"";
  position:fixed;
  inset:0;
  pointer-events:none;
  background:
    linear-gradient(90deg,var(--line) 1px,transparent 1px),
    linear-gradient(180deg,var(--line) 1px,transparent 1px);
  background-size:72px 72px;
}
main{
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
  padding:32px;
}
.card{max-width:720px}
.logo{
  width:min(280px,64vw);
  height:auto;
  display:block;
  margin:0 auto 72px;
}
h1{
  margin:0;
  font-size:clamp(44px,7vw,86px);
  line-height:1.02;
  letter-spacing:-.055em;
  font-weight:520;
}
p{
  margin:28px auto 0;
  max-width:540px;
  font-size:clamp(18px,2vw,24px);
  line-height:1.5;
  color:var(--muted);
}
a{
  display:inline-block;
  margin-top:42px;
  color:#fffaf0;
  background:#111;
  border:1px solid #111;
  border-radius:999px;
  padding:15px 22px;
  text-decoration:none;
  font-size:14px;
}
</style>
</head>
<body>
<main>
  <section class="card">
    <img class="logo" src="rita-logo.svg" alt="RITA" />
    <h1>Thank you.</h1>
    <p>We’ll only reach out when there is something genuinely worth sharing.</p>
    <a href="/">Back to RITA</a>
  </section>
</main>
</body>
</html>
