<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RITA · Living Operations</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900&display=swap" rel="stylesheet">
<style>
:root{
  --bg1:#fffdf7;--bg2:#fff4df;--bg3:#ffdca6;
  --ink:#111111;--ink-soft:#5f594f;--ink-faint:rgba(17,17,17,.42);
  --line:rgba(40,30,18,.13);--line-soft:rgba(40,30,18,.06);
  --orange:#d98a2b;
  --maintenance:#a06b0a;--cleaning:#2F6FB0;--attention:#b83c0d;--ok:#3a7a55;
  --surface:rgba(255,253,247,.86);
  --grid:rgba(40,30,18,.045);
  --panel:360px;
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;overflow:hidden;}
body{
  color:var(--ink);
  font-family:"Inter",system-ui,sans-serif;
  font-size:15px;line-height:1.5;
  -webkit-font-smoothing:antialiased;
  background:
    radial-gradient(circle at 50% 32%,rgba(255,255,255,.90),transparent 26%),
    radial-gradient(circle at 48% 54%,rgba(255,145,22,.18),transparent 34%),
    radial-gradient(circle at 12% 88%,rgba(217,138,43,.10),transparent 30%),
    linear-gradient(180deg,var(--bg1) 0%,var(--bg2) 48%,var(--bg3) 100%);
  background-attachment:fixed;
}
body::before{
  content:"";position:fixed;inset:0;pointer-events:none;z-index:0;
  background:
    linear-gradient(90deg,var(--grid) 1px,transparent 1px),
    linear-gradient(180deg,var(--grid) 1px,transparent 1px);
  background-size:72px 72px;
  mask-image:radial-gradient(circle at 50% 42%,black,transparent 78%);
  -webkit-mask-image:radial-gradient(circle at 50% 42%,black,transparent 78%);
}
.corner-logo{position:fixed;top:18px;left:22px;display:flex;align-items:center;gap:10px;z-index:10;}
.corner-logo img{
  width:68px;height:auto;flex:none;
  animation:float 7s ease-in-out infinite;
  filter:drop-shadow(0 8px 20px rgba(217,138,43,.22));
}
.corner-logo .brand{display:flex;flex-direction:column;line-height:1.25;}
.corner-logo .mark{font-weight:600;letter-spacing:0.13em;font-size:16px;color:var(--ink);}
.corner-logo .sub{color:var(--ink-soft);font-size:10.5px;font-weight:400;}
@keyframes float{0%,100%{transform:translateY(0) rotate(-.6deg);}50%{transform:translateY(-12px) rotate(.7deg);}}
.summon{
  position:fixed;bottom:24px;right:24px;z-index:10;
  display:flex;align-items:center;gap:9px;
  background:#111;border:none;border-radius:999px;
  padding:11px 20px 11px 14px;cursor:pointer;
  filter:drop-shadow(0 8px 22px rgba(17,17,17,.22));
  transition:transform .18s,filter .18s;
  font-family:inherit;
}
.summon:hover{transform:translateY(-2px);filter:drop-shadow(0 12px 28px rgba(17,17,17,.28));}
.summon .dot{width:9px;height:9px;border-radius:50%;background:#4caf50;flex:none;}
.summon .lbl{font-size:14px;font-weight:500;letter-spacing:0.08em;color:#fffaf0;}
.layout{position:fixed;inset:0;z-index:1;display:flex;pointer-events:none;}
.cards-area{flex:1;overflow-y:auto;padding:82px 20px 80px;pointer-events:auto;}
.cards-area::-webkit-scrollbar{width:4px;}
.cards-area::-webkit-scrollbar-thumb{background:var(--line);border-radius:4px;}
.rita-panel{
  width:var(--panel);flex:none;height:100%;
  display:flex;flex-direction:column;
  background:var(--surface);
  border-left:1px solid var(--line);
  backdrop-filter:blur(18px);-webkit-backdrop-filter:blur(18px);
  transform:translateX(100%);
  transition:transform .28s cubic-bezier(.2,.7,.2,1);
  pointer-events:auto;
  position:relative;
}
body[data-panel="open"] .rita-panel{transform:none;}
.panel-head{
  padding:18px 16px 14px;
  border-bottom:1px solid var(--line-soft);
  display:flex;align-items:center;justify-content:space-between;
  flex:none;
}
.panel-head .ptitle{display:flex;align-items:center;gap:8px;}
.panel-head .dot{width:8px;height:8px;border-radius:50%;background:#4caf50;flex:none;}
.panel-head .pname{font-weight:600;letter-spacing:0.10em;font-size:13px;color:var(--ink);}
.panel-head .close-p{width:26px;height:26px;border-radius:8px;border:1px solid var(--line);
  background:rgba(255,253,247,.5);cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;color:var(--ink-soft);font-family:inherit;transition:.15s;}
.panel-head .close-p:hover{border-color:var(--orange);color:var(--ink);}
.q-section{flex:none;border-bottom:1px solid var(--line-soft);padding:12px 14px;}
.q-toggle{
  display:flex;align-items:center;gap:8px;width:100%;text-align:left;
  background:none;border:none;cursor:pointer;font-family:inherit;
  font-size:12.5px;font-weight:500;color:var(--ink-soft);letter-spacing:0.06em;
  padding:2px 0;
}
.q-toggle .arr{font-size:11px;transition:transform .18s;display:inline-block;}
body[data-qopen="yes"] .q-toggle .arr{transform:rotate(90deg);}
.q-list{display:none;flex-direction:column;gap:4px;margin-top:10px;}
body[data-qopen="yes"] .q-list{display:flex;}
.q-empty{font-size:12.5px;color:var(--ink-faint);padding:6px 2px;line-height:1.45;}
.q-item{
  display:flex;align-items:center;gap:8px;width:100%;text-align:left;
  background:rgba(255,253,247,.5);border:1px solid var(--line);border-radius:10px;
  padding:9px 12px;cursor:pointer;font-family:inherit;font-size:13px;color:var(--ink);
  transition:border-color .15s;
}
.q-item:hover{border-color:var(--orange);}
.q-item .qdot{width:6px;height:6px;border-radius:2px;background:var(--orange);flex:none;animation:breathe 4.5s ease-in-out infinite;}
@keyframes breathe{0%,100%{opacity:.3;}50%{opacity:1;}}
.q-quick{margin-top:12px;display:flex;flex-wrap:wrap;gap:6px;}
.q-quick-label{width:100%;font-size:10px;letter-spacing:0.08em;text-transform:uppercase;color:var(--ink-faint);margin-bottom:2px;}
.q-quick button{
  font-size:11.5px;color:var(--ink-soft);background:rgba(255,253,247,.55);
  border:1px solid var(--line);border-radius:999px;padding:5px 11px;cursor:pointer;font-family:inherit;transition:.14s;
}
.q-quick button:hover{border-color:var(--orange);color:var(--ink);}
.chat-area{flex:1;overflow-y:auto;padding:14px 14px 0;display:flex;flex-direction:column;gap:10px;}
.chat-area::-webkit-scrollbar{width:3px;}
.chat-area::-webkit-scrollbar-thumb{background:var(--line);border-radius:3px;}
.msg-rita{font-size:13px;color:var(--ink-soft);line-height:1.5;padding:10px 12px;
  background:rgba(255,253,247,.5);border:1px solid var(--line-soft);border-radius:12px;}
.msg-rita b{font-weight:500;color:var(--orange);}
.msg-you{font-size:13px;color:var(--ink);line-height:1.5;padding:9px 12px;
  background:rgba(17,17,17,.06);border-radius:12px;align-self:flex-end;max-width:90%;}
.panel-input{flex:none;padding:12px 14px 16px;border-top:1px solid var(--line-soft);}
.inp-wrap{display:flex;align-items:center;gap:8px;border:1px solid var(--line);border-radius:12px;
  padding:8px 8px 8px 12px;background:rgba(255,253,247,.55);}
.inp-wrap .rdot{width:7px;height:7px;border-radius:2px;background:var(--orange);flex:none;}
.inp-wrap input{flex:1;border:none;background:none;outline:none;font-family:inherit;font-size:14px;color:var(--ink);}
.inp-wrap input::placeholder{color:var(--ink-faint);}
.inp-wrap .go{width:28px;height:28px;border-radius:8px;border:none;background:var(--ink);
  color:#fffaf0;cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;font-family:inherit;transition:.15s;}
.inp-wrap .go:hover{opacity:.8;}
.inp-wrap .go:disabled{opacity:.45;cursor:default;}
.field{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:13px;align-items:start;}
body[data-panel="open"] .field{grid-template-columns:repeat(auto-fill,minmax(260px,1fr));}
.field-top{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:14px;}
.tray{display:flex;gap:7px;flex-wrap:wrap;flex:1;}
.tray-chip{display:inline-flex;align-items:center;gap:6px;font-size:12px;color:var(--ink-soft);
  background:rgba(255,253,247,.8);border:1px solid var(--line);border-radius:999px;padding:5px 12px;
  cursor:pointer;font-family:inherit;transition:.15s;backdrop-filter:blur(8px);}
.tray-chip:hover{border-color:var(--orange);color:var(--ink);}
.tray-chip .d{width:5px;height:5px;border-radius:1.5px;background:var(--orange);}
.closeall{font-size:12.5px;color:var(--ink-soft);background:rgba(255,253,247,.8);
  border:1px solid var(--line);border-radius:999px;padding:5px 14px;
  cursor:pointer;font-family:inherit;transition:.15s;backdrop-filter:blur(8px);}
.closeall:hover{border-color:var(--orange);color:var(--ink);}
.card{background:var(--surface);border:1px solid var(--line);border-radius:20px;padding:16px 16px 13px;
  backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);
  filter:drop-shadow(0 2px 16px rgba(40,30,18,.07));
  animation:rise .36s cubic-bezier(.2,.7,.2,1) both;position:relative;overflow:hidden;}
.card.closing{animation:fade .22s ease forwards;}
.card.woken::before{content:"";position:absolute;top:0;left:0;width:100%;height:3px;background:var(--orange);}
.card.loading .rows{opacity:.55;}
@keyframes rise{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:none;}}
@keyframes fade{to{opacity:0;transform:translateY(5px) scale(.99);}}
.card-head{display:flex;align-items:flex-start;justify-content:space-between;gap:8px;}
.eyebrow{font-size:10px;letter-spacing:0.10em;text-transform:uppercase;color:var(--ink-faint);margin-bottom:3px;font-weight:500;}
.card-head h3{font-weight:520;font-size:16px;letter-spacing:-.03em;color:var(--ink);}
.ctrls{display:flex;gap:4px;flex:none;}
.ic{width:24px;height:24px;border-radius:7px;border:1px solid var(--line);
  background:rgba(255,253,247,.5);color:var(--ink-faint);
  cursor:pointer;font-size:13px;display:flex;align-items:center;justify-content:center;
  font-family:inherit;transition:.14s;}
.ic:hover{border-color:var(--orange);color:var(--ink);}
.why{font-size:11.5px;color:var(--orange);margin:7px 0 1px;line-height:1.4;font-weight:500;}
.rows{margin-top:11px;display:flex;flex-direction:column;}
.row{display:flex;align-items:baseline;gap:8px;padding:4px 0;border-top:1px solid var(--line-soft);}
.row:first-child{border-top:none;}
.row .k{flex:none;width:100px;color:var(--ink-soft);font-size:11.5px;font-weight:400;}
.row .v{flex:1;color:var(--ink);font-size:13px;}
.row .v small{color:var(--ink-faint);font-size:11px;}
.tag{font-size:11px;font-weight:500;}
.tag.ok{color:var(--ok);}.tag.maintenance{color:var(--maintenance);}
.tag.cleaning{color:var(--cleaning);}.tag.attention{color:var(--attention);}.tag.faint{color:var(--ink-faint);}
.note{color:var(--ink-faint);font-size:11px;margin-top:8px;line-height:1.45;}
.log{margin-top:10px;display:flex;flex-direction:column;gap:5px;}
.logline{font-size:11.5px;line-height:1.4;border-left:2px solid var(--line);padding-left:8px;}
.logline.you{color:var(--ink);}.logline.rita{color:var(--ink-soft);border-left-color:var(--orange);}
.logline b{font-weight:500;}.logline .to{color:var(--orange);font-weight:500;}
.composer{display:flex;align-items:center;gap:6px;margin-top:11px;
  border:1px solid var(--line);border-radius:10px;padding:5px 5px 5px 9px;
  background:rgba(255,253,247,.45);}
.composer select{border:none;background:none;font-family:inherit;font-size:11.5px;color:var(--ink-soft);outline:none;max-width:110px;cursor:pointer;}
.composer input{flex:1;border:none;background:none;outline:none;font-family:inherit;font-size:12.5px;color:var(--ink);min-width:0;}
.composer input::placeholder{color:var(--ink-faint);}
.composer .send{flex:none;width:26px;height:26px;border-radius:7px;border:none;
  background:var(--ink);color:#fffaf0;cursor:pointer;font-size:13px;display:flex;align-items:center;justify-content:center;transition:.14s;}
.composer .send:hover{opacity:.8;}
.composer .send:disabled{opacity:.45;cursor:default;}
.task-row{margin-top:9px;}
.resolve{font-size:11.5px;color:var(--ok);background:none;border:1px solid rgba(58,122,85,.28);
  border-radius:999px;padding:4px 12px;cursor:pointer;font-family:inherit;transition:.14s;}
.resolve:hover{border-color:var(--ok);}
</style>
</head>
<body data-state="rest" data-panel="closed" data-qopen="no">

<div class="corner-logo">
  <img src="/floating-orange.png" alt="RITA" width="68" height="68">
  <span class="brand">
    <span class="mark">RITA</span>
    <span class="sub">Las Canas Beach Retreat</span>
  </span>
</div>

<div class="layout">
  <div class="cards-area" id="cardsArea">
    <div class="field-top" id="fieldTop" style="display:none;">
      <div class="tray" id="tray"></div>
      <button class="closeall" id="closeall" type="button">Закрыть все</button>
    </div>
    <div class="field" id="field"></div>
  </div>

  <div class="rita-panel" id="ritaPanel">
    <div class="panel-head">
      <div class="ptitle">
        <span class="dot"></span>
        <span class="pname">RITA</span>
      </div>
      <button class="close-p" id="closePanel" type="button" aria-label="Close panel">×</button>
    </div>

    <div class="q-section">
      <button class="q-toggle" id="qToggle" type="button">
        <span class="arr">›</span> ВОПРОСЫ РИТЫ <span id="qCount"></span>
      </button>
      <div class="q-list" id="qList"></div>
      <div class="q-quick" id="qQuick">
        <div class="q-quick-label">Открыть область</div>
        <button type="button" data-q="arrivals">Заезды сегодня</button>
        <button type="button" data-q="kitchen">Ресторан и бар</button>
        <button type="button" data-q="purchase">Закупки</button>
        <button type="button" data-q="responsibility">Кто что несёт</button>
        <button type="button" data-q="risks">Зона риска</button>
        <button type="button" data-q="pulse">Как мы сегодня</button>
      </div>
    </div>

    <div class="chat-area" id="chatArea">
      <div class="msg-rita"><b>Рита:</b> Доброе утро. Открой область слева или задай вопрос — я на связи.</div>
    </div>

    <div class="panel-input">
      <div class="inp-wrap">
        <span class="rdot"></span>
        <input id="panelInput" type="text" placeholder="Спросить Риту…" autocomplete="off">
        <button class="go" id="panelSend" type="button" aria-label="Send">→</button>
      </div>
    </div>
  </div>
</div>

<button class="summon" id="summon" type="button">
  <span class="dot"></span>
  <span class="lbl">RITA</span>
</button>

<script>
(function () {
  'use strict'

  const STAFF_KEY = 'rita2026'
  const AUTH_HEADERS = {
    'Content-Type': 'application/json',
    Authorization: 'Bearer ' + STAFF_KEY
  }
  const R = 'Рите'
  const QUESTIONS_POLL_MS = 60000

  let chatHistory = []
  let questionsTimer = null
  let pulseCache = null
  let portalsCache = null

  const field = document.getElementById('field')
  const tray = document.getElementById('tray')
  const fieldTop = document.getElementById('fieldTop')
  const qList = document.getElementById('qList')
  const qCount = document.getElementById('qCount')
  const chatArea = document.getElementById('chatArea')
  const shown = []

  function esc(s) {
    return String(s ?? '').replace(/[&<>]/g, (c) => ({'&': '&amp;', '<': '&lt;', '>': '&gt;'}[c]))
  }

  function tag(cls, text) {
    return '<span class="tag ' + cls + '">' + esc(text) + '</span>'
  }

  function isTag(s) {
    return typeof s === 'string' && s.indexOf('class="tag') > -1
  }

  function formatBalance(status) {
    if (!status) return '—'
    return String(status)
      .split('-')
      .map((p) => p.charAt(0).toUpperCase() + p.slice(1))
      .join(' ')
  }

  function fmtDate(iso) {
    if (!iso) return '—'
    const d = new Date(iso + 'T12:00:00')
    if (Number.isNaN(d.getTime())) return iso
    return d.toLocaleDateString('en-GB', {day: 'numeric', month: 'short'})
  }

  function todayIso() {
    return new Date().toISOString().slice(0, 10)
  }

  function apiUrl(path) {
    const sep = path.includes('?') ? '&' : '?'
    return path + sep + 'key=' + encodeURIComponent(STAFF_KEY)
  }

  async function apiGet(path) {
    const res = await fetch(apiUrl(path), {headers: AUTH_HEADERS})
    const json = await res.json().catch(() => ({}))
    if (!res.ok) throw new Error(json.error || res.statusText || 'Request failed')
    return json
  }

  async function apiPost(path, body) {
    const res = await fetch(path, {
      method: 'POST',
      headers: AUTH_HEADERS,
      body: JSON.stringify({...body, staffKey: STAFF_KEY})
    })
    const json = await res.json().catch(() => ({}))
    if (!res.ok) throw new Error(json.error || res.statusText || 'Request failed')
    return json
  }

  const CARDS = {
    arrivals: {
      eyebrow: 'Arrivals',
      title: 'Groups today',
      span: false,
      task: false,
      live: true,
      recipients: [R, 'Groups'],
      rows: [['Loading', '…', '']],
      note: ''
    },
    kitchen: {
      eyebrow: 'Readiness',
      title: 'Restaurant & Bar',
      span: false,
      task: false,
      recipients: [R, 'Kitchen · Charina', 'Restaurant · Suleimi'],
      rows: [
        ['Kitchen', 'Charina', 'owns domain'],
        ['Restaurant', 'Suleimi', 'owns domain'],
        ['Menu', tag('attention', 'draft'), 'no group menu yet'],
        ['Bar stock', tag('faint', 'no data'), 'awaiting Poster POS']
      ],
      note: 'Live data coming soon.'
    },
    purchase: {
      eyebrow: 'Purchases · Diomedes',
      title: 'Purchase list · this week',
      span: false,
      task: true,
      recipients: [R, 'Purchases · Diomedes'],
      rows: [
        ['Coffee beans', '5 kg', tag('attention', 'low')],
        ['Plantains', '20 kg', 'for groups'],
        ['Bar tonic', '48 u', tag('attention', 'low')],
        ['Cleaning', '—', tag('ok', 'ok')]
      ],
      note: 'Live data coming soon.'
    },
    responsibility: {
      eyebrow: 'Who carries what',
      title: 'Responsibility',
      span: false,
      task: false,
      recipients: [R],
      rows: [
        ['Operations', 'Yasper · Alex', 'Steward'],
        ['Kitchen', 'Charina', 'Own'],
        ['Restaurant', 'Suleimi', 'Own'],
        ['Finance', 'Renate', 'Own'],
        ['Inventory', 'Diomedes', 'Own']
      ],
      note: 'Live data coming soon. Shift coverage not tracked yet.'
    },
    risks: {
      eyebrow: 'Needs watching',
      title: 'Risks',
      span: false,
      task: true,
      live: true,
      recipients: [R],
      rows: [['Open concerns', '…', '']],
      note: ''
    },
    pulse: {
      eyebrow: 'Today',
      title: 'Las Canas',
      span: false,
      task: false,
      live: true,
      recipients: [R],
      rows: [['Balance', '…', ''], ['Field', '…', '']],
      note: ''
    }
  }

  function rowHtml(r) {
    const v = isTag(r[1]) ? r[1] : esc(r[1])
    const s = r[2] ? ' <small>· ' + (isTag(r[2]) ? r[2] : esc(r[2])) + '</small>' : ''
    return '<div class="row"><div class="k">' + esc(r[0]) + '</div><div class="v">' + v + s + '</div></div>'
  }

  function renderCard(key, why) {
    const d = CARDS[key]
    if (!d) return ''
    const rows = d.rows.map(rowHtml).join('')
    const opts = d.recipients.map((r) => '<option>' + esc(r) + '</option>').join('')
    let h = '<div class="card' + (why ? ' woken' : '') + '" id="card-' + key + '" data-key="' + key + '">'
    h += '<div class="card-head"><div>'
    if (d.eyebrow) h += '<div class="eyebrow">' + esc(d.eyebrow) + '</div>'
    h += '<h3 id="card-title-' + key + '">' + esc(d.title) + '</h3></div>'
    h += '<div class="ctrls"><button class="ic" data-act="min" type="button" title="Свернуть">–</button>'
      + '<button class="ic" data-act="close" type="button" title="Закрыть">×</button></div></div>'
    if (why) h += '<div class="why" id="card-why-' + key + '">' + esc(why) + '</div>'
    else h += '<div class="why" id="card-why-' + key + '" hidden></div>'
    h += '<div class="rows" id="card-rows-' + key + '">' + rows + '</div>'
    h += '<div class="note" id="card-note-' + key + '">' + esc(d.note || '') + '</div>'
    h += '<div class="log" id="log-' + key + '"></div>'
    h += '<div class="composer"><select aria-label="Кому">' + opts + '</select>'
      + '<input placeholder="Написать…" aria-label="Сообщение">'
      + '<button class="send" data-act="send" type="button">→</button></div>'
    if (d.task) h += '<div class="task-row"><button class="resolve" data-act="resolve" type="button">✓ Задача закрыта</button></div>'
    h += '</div>'
    return h
  }

  function updateCardDom(key) {
    const d = CARDS[key]
    const titleEl = document.getElementById('card-title-' + key)
    const rowsEl = document.getElementById('card-rows-' + key)
    const noteEl = document.getElementById('card-note-' + key)
    const eyebrowEl = document.querySelector('#card-' + key + ' .eyebrow')
    if (titleEl) titleEl.textContent = d.title
    if (eyebrowEl) eyebrowEl.textContent = d.eyebrow
    if (rowsEl) rowsEl.innerHTML = d.rows.map(rowHtml).join('')
    if (noteEl) noteEl.textContent = d.note || ''
  }

  function setCardWhy(key, why) {
    const el = document.getElementById('card-why-' + key)
    if (!el) return
    if (why) {
      el.textContent = why
      el.hidden = false
      document.getElementById('card-' + key)?.classList.add('woken')
    } else {
      el.hidden = true
    }
  }

  async function loadPulseData() {
    const data = await apiGet('/api/ops-pulse')
    pulseCache = data
    return data
  }

  function applyPulseToCard(data) {
    const pulse = data?.pulse || {}
    const concerns = Array.isArray(data?.concerns) ? data.concerns : []
    const balance = formatBalance(pulse.balanceStatus)
    const concernCount = concerns.length
    const fieldLabel = concernCount
      ? tag('attention', concernCount + ' open')
      : tag('ok', 'all clear')

    CARDS.pulse.eyebrow = 'Today · Pulse'
    CARDS.pulse.title = 'Las Canas Beach Retreat'
    CARDS.pulse.rows = [
      ['Balance', tag('ok', balance.toLowerCase()), 'hotel load tier'],
      ['Field', fieldLabel, concernCount ? 'open concerns' : 'no open concerns'],
      ['Concerns', String(concernCount), concernCount === 1 ? 'needs attention' : 'total open']
    ]
    CARDS.pulse.note = pulse.coherenceStatement?.trim() || ''
    updateCardDom('pulse')
  }

  async function refreshPulseCard() {
    const card = document.getElementById('card-pulse')
    if (card) card.classList.add('loading')
    try {
      const data = pulseCache || await loadPulseData()
      applyPulseToCard(data)
    } catch (err) {
      CARDS.pulse.note = 'Could not load pulse: ' + err.message
      updateCardDom('pulse')
    } finally {
      document.getElementById('card-pulse')?.classList.remove('loading')
    }
  }

  async function loadPortalsData() {
    const data = await apiGet('/api/portals')
    portalsCache = data.portals || []
    return portalsCache
  }

  function roomingStatusText(portal) {
    const core = portal.progressSections?.core ?? portal.progressPercent ?? 0
    if (core >= 80) return 'ready'
    if (core >= 40) return 'in progress'
    return 'pending'
  }

  function applyArrivalsToCard(portals) {
    const today = todayIso()
    const arriving = portals.filter((p) => p.checkIn === today)
    const list = arriving.length ? arriving : portals.filter((p) => p.checkIn && p.checkIn >= today).slice(0, 4)

    if (!list.length) {
      CARDS.arrivals.eyebrow = 'Arrivals · ' + fmtDate(today)
      CARDS.arrivals.title = 'No groups today'
      CARDS.arrivals.rows = [['Groups', tag('ok', 'clear'), 'no check-ins scheduled']]
      CARDS.arrivals.note = 'Live data from portals.'
      updateCardDom('arrivals')
      return
    }

    CARDS.arrivals.eyebrow = arriving.length
      ? 'Arriving today · ' + fmtDate(today)
      : 'Upcoming arrivals'
    CARDS.arrivals.title = list.length === 1
      ? list[0].groupName + ' · ' + (list[0].totalGuests || '—') + ' guests'
      : list.length + ' groups'

    CARDS.arrivals.rows = list.slice(0, 6).map((p) => [
      p.groupName || 'Group',
      fmtDate(p.checkIn) + ' → ' + fmtDate(p.checkOut),
      (p.totalGuests || '—') + ' guests · rooming ' + roomingStatusText(p)
    ])

    CARDS.arrivals.note = arriving.length
      ? arriving.length + ' group(s) checking in today.'
      : 'Next arrivals from live portal data.'
    updateCardDom('arrivals')
  }

  async function refreshArrivalsCard() {
    const card = document.getElementById('card-arrivals')
    if (card) card.classList.add('loading')
    try {
      const portals = portalsCache || await loadPortalsData()
      applyArrivalsToCard(portals)
    } catch (err) {
      CARDS.arrivals.note = 'Could not load groups: ' + err.message
      updateCardDom('arrivals')
    } finally {
      document.getElementById('card-arrivals')?.classList.remove('loading')
    }
  }

  async function refreshRisksCard() {
    try {
      const data = pulseCache || await loadPulseData()
      const concerns = Array.isArray(data?.concerns) ? data.concerns : []
      if (!concerns.length) {
        CARDS.risks.rows = [['Field', tag('ok', 'all clear'), 'no open concerns']]
      } else {
        CARDS.risks.rows = concerns.slice(0, 5).map((c) => {
          const place = c.relatedPlace?.name || c.relatedPlace?.unitCode || 'Place'
          const hours = c.openedAt ? Math.round((Date.now() - new Date(c.openedAt)) / 3600000) + 'h' : ''
          return [place, tag('attention', 'open'), hours || 'in progress']
        })
      }
      updateCardDom('risks')
    } catch (err) {
      CARDS.risks.note = 'Could not load risks: ' + err.message
      updateCardDom('risks')
    }
  }

  async function wake(key, why) {
    if (!CARDS[key]) return

    if (shown.indexOf(key) > -1) {
      if (why) setCardWhy(key, why)
      if (key === 'pulse') refreshPulseCard()
      if (key === 'arrivals') refreshArrivalsCard()
      if (key === 'risks') refreshRisksCard()
      return
    }

    field.insertAdjacentHTML('beforeend', renderCard(key, why || null))
    shown.push(key)
    fieldTop.style.display = 'flex'

    if (key === 'pulse') await refreshPulseCard()
    if (key === 'arrivals') await refreshArrivalsCard()
    if (key === 'risks') await refreshRisksCard()
  }

  function removeCard(key) {
    const c = document.getElementById('card-' + key)
    const chip = tray.querySelector('[data-key="' + key + '"]')
    if (chip) chip.remove()
    if (c) {
      c.classList.add('closing')
      setTimeout(function () {
        if (c.parentNode) c.parentNode.removeChild(c)
        afterRemove(key)
      }, 200)
    } else {
      afterRemove(key)
    }
  }

  function afterRemove(key) {
    const i = shown.indexOf(key)
    if (i > -1) shown.splice(i, 1)
    if (shown.length === 0) fieldTop.style.display = 'none'
  }

  function minimize(key) {
    const c = document.getElementById('card-' + key)
    if (!c) return
    c.style.display = 'none'
    const d = CARDS[key]
    const chip = document.createElement('button')
    chip.className = 'tray-chip'
    chip.setAttribute('data-key', key)
    chip.type = 'button'
    chip.innerHTML = '<span class="d"></span>' + esc(d.title)
    chip.addEventListener('click', function () {
      c.style.display = ''
      chip.remove()
    })
    tray.appendChild(chip)
  }

  function closeAll() {
    shown.slice().forEach(function (k) {
      const c = document.getElementById('card-' + k)
      if (c && c.parentNode) c.parentNode.removeChild(c)
    })
    tray.innerHTML = ''
    shown.length = 0
    fieldTop.style.display = 'none'
  }

  function logLine(key, cls, html) {
    const log = document.getElementById('log-' + key)
    if (!log) return
    const el = document.createElement('div')
    el.className = 'logline ' + cls
    el.innerHTML = html
    log.appendChild(el)
  }

  async function sendMsg(key) {
    const card = document.getElementById('card-' + key)
    if (!card) return
    const rcpt = card.querySelector('select').value
    const inp = card.querySelector('.composer input')
    const sendBtn = card.querySelector('.composer .send')
    const msg = inp.value.trim()
    if (!msg) return

    logLine(key, 'you', '<b>Вы → <span class="to">' + esc(rcpt) + '</span>:</b> ' + esc(msg))
    inp.value = ''
    if (sendBtn) sendBtn.disabled = true

    const cardTitle = CARDS[key]?.title || key
    const routed = rcpt === R
      ? msg
      : '[' + cardTitle + ' → ' + rcpt + '] ' + msg

    try {
      const json = await apiPost('/api/rita-chat', {
        message: routed,
        history: [],
        liveData: buildLiveContext()
      })
      logLine(key, 'rita', '<b>Рита:</b> ' + esc(json.reply || 'Приняла.'))
    } catch (err) {
      logLine(key, 'rita', '<b>Рита:</b> ' + esc('Ошибка — ' + err.message))
    } finally {
      if (sendBtn) sendBtn.disabled = false
      inp.focus()
    }
  }

  function openPanel() {
    document.body.setAttribute('data-panel', 'open')
  }

  function closePanel() {
    document.body.setAttribute('data-panel', 'closed')
  }

  function addChatMsg(cls, html) {
    const el = document.createElement('div')
    el.className = cls
    el.innerHTML = html
    chatArea.appendChild(el)
    chatArea.scrollTop = chatArea.scrollHeight
    return el
  }

  function showChatTyping() {
    const el = addChatMsg('msg-rita', '<b>Рита:</b> ···')
    el.id = 'chatTyping'
    return el
  }

  function hideChatTyping() {
    document.getElementById('chatTyping')?.remove()
  }

  function buildLiveContext() {
    if (!pulseCache) return {}
    const places = []
    const f = pulseCache.field || {}
    ;(f.sharedSpaces || []).forEach(function (s) { places.push(s.name) })
    ;(f.buildings || []).forEach(function (b) {
      places.push(b.name + ' (' + (b.units || []).map(function (u) { return u.unitCode }).join(', ') + ')')
    })
    if (f.villa) places.push('Villa')
    const unitDetails = (pulseCache.places || [])
      .filter(function (p) { return p.type === 'accommodation' && p.bedrooms })
      .map(function (p) {
        const beds = p.bedrooms.map(function (b) {
          const parts = []
          if (b.kingBeds) parts.push(b.kingBeds + ' king')
          if (b.queenBeds) parts.push(b.queenBeds + ' queen')
          if (b.twinBeds) parts.push(b.twinBeds + ' twin' + (b.twinCanConvertToKing ? ' (convertible to king)' : ''))
          if (b.bunkBeds) parts.push(b.bunkBeds + ' bunk')
          return b.label + ': ' + parts.join(', ')
        }).join('; ')
        return p.unitCode + ': ' + beds + ', sleeps ' + p.capacity
      })
    return {
      property: 'Las Canas Beach Retreat',
      balanceStatus: pulseCache.pulse?.balanceStatus || null,
      coherenceStatement: pulseCache.pulse?.coherenceStatement || null,
      places: places,
      unitDetails: unitDetails,
      openConcernsCount: (pulseCache.concerns || []).length,
      openConcerns: (pulseCache.concerns || []).slice(0, 5).map(function (c) {
        return {
          place: c.relatedPlace?.name || c.relatedPlace?.unitCode || 'unknown',
          summary: c.summary,
          openedAt: c.openedAt
        }
      }),
      portals: (portalsCache || []).slice(0, 5).map(function (p) {
        return {
          group: p.groupName,
          checkIn: p.checkIn,
          checkOut: p.checkOut,
          guests: p.totalGuests
        }
      }),
      roomingLists: (pulseCache.roomingLists || []).map(function (r) {
        return {
          groupId: r.groupId,
          dates: r.stayDateStart + ' → ' + r.stayDateEnd,
          guests: r.totalOccupants,
          rooms: (r.rooms || []).map(function (rm) {
            return 'Room ' + rm.roomNumber + ' (' + rm.roomType + '): ' +
              (rm.occupants || []).map(function (o) { return o.name }).join(', ')
          }).join(' | ')
        }
      })
    }
  }

  async function sendChat() {
    const inp = document.getElementById('panelInput')
    const sendBtn = document.getElementById('panelSend')
    const msg = inp.value.trim()
    if (!msg) return

    chatHistory.push({role: 'user', content: msg})
    addChatMsg('msg-you', esc(msg))
    inp.value = ''
    if (sendBtn) sendBtn.disabled = true
    showChatTyping()

    const recentHistory = chatHistory
      .slice(0, -1)
      .slice(-6)
      .map((m) => ({role: m.role === 'rita' ? 'rita' : 'user', content: m.content}))

    try {
      const json = await apiPost('/api/rita-chat', {
        message: msg,
        history: recentHistory,
        liveData: buildLiveContext()
      })
      hideChatTyping()
      const reply = json.reply || 'Приняла.'
      chatHistory.push({role: 'rita', content: reply})
      addChatMsg('msg-rita', '<b>Рита:</b> ' + esc(reply))
    } catch (err) {
      hideChatTyping()
      addChatMsg('msg-rita', '<b>Рита:</b> ' + esc('Ошибка — ' + err.message))
    } finally {
      if (sendBtn) sendBtn.disabled = false
      inp.focus()
    }
  }

  function renderQuestions(questions) {
    qCount.textContent = questions.length ? '(' + questions.length + ')' : ''
    if (!questions.length) {
      qList.innerHTML = '<p class="q-empty">No open questions right now.</p>'
      return
    }
    qList.innerHTML = questions.map(function (q) {
      return '<button type="button" class="q-item" data-question-id="' + esc(q._id) + '">'
        + '<span class="qdot"></span>' + esc(q.question) + '</button>'
    }).join('')
  }

  async function loadQuestions(silent) {
    try {
      const json = await apiGet('/api/rita-questions')
      renderQuestions(json.questions || [])
    } catch (err) {
      if (!silent) {
        qList.innerHTML = '<p class="q-empty">' + esc(err.message) + '</p>'
      }
    }
  }

  function startQuestionsPolling() {
    if (questionsTimer) clearInterval(questionsTimer)
    questionsTimer = setInterval(function () {
      loadQuestions(true)
    }, QUESTIONS_POLL_MS)
  }

  document.getElementById('qToggle').addEventListener('click', function () {
    const open = document.body.getAttribute('data-qopen') === 'yes'
    document.body.setAttribute('data-qopen', open ? 'no' : 'yes')
  })

  qList.addEventListener('click', function (e) {
    const btn = e.target.closest('.q-item')
    if (!btn || !btn.dataset.questionId) return
    const text = btn.textContent.trim()
    wake('risks', text)
    document.body.setAttribute('data-qopen', 'no')
    openPanel()
  })

  document.getElementById('qQuick').addEventListener('click', function (e) {
    const btn = e.target.closest('button[data-q]')
    if (!btn) return
    const key = btn.getAttribute('data-q')
    const labels = {
      arrivals: 'Заезды сегодня',
      kitchen: 'Ресторан и бар',
      purchase: 'Закупки',
      responsibility: 'Кто что несёт',
      risks: 'Зона риска',
      pulse: 'Как мы сегодня'
    }
    wake(key, 'Рита открывает · ' + (labels[key] || key))
    document.body.setAttribute('data-qopen', 'no')
  })

  field.addEventListener('click', function (e) {
    const btn = e.target.closest('[data-act]')
    if (!btn) return
    const card = e.target.closest('.card')
    if (!card) return
    const key = card.getAttribute('data-key')
    const act = btn.getAttribute('data-act')
    if (act === 'min') minimize(key)
    else if (act === 'close') removeCard(key)
    else if (act === 'resolve') removeCard(key)
    else if (act === 'send') sendMsg(key)
  })

  field.addEventListener('keydown', function (e) {
    if (e.key !== 'Enter') return
    const inp = e.target.closest('.composer input')
    if (!inp) return
    e.preventDefault()
    sendMsg(e.target.closest('.card').getAttribute('data-key'))
  })

  document.getElementById('closeall').addEventListener('click', closeAll)

  document.getElementById('summon').addEventListener('click', function () {
    document.body.getAttribute('data-panel') === 'open' ? closePanel() : openPanel()
  })
  document.getElementById('closePanel').addEventListener('click', closePanel)
  document.getElementById('panelSend').addEventListener('click', sendChat)
  document.getElementById('panelInput').addEventListener('keydown', function (e) {
    if (e.key === 'Enter') {
      e.preventDefault()
      sendChat()
    }
  })

  loadQuestions(false)
  startQuestionsPolling()
  loadPulseData().catch(function () {})
  loadPortalsData().catch(function () {})
})()
</script>
</body>
</html>
