<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Las Canas — Group Portal</title>
    <link rel="stylesheet" href="/portal.css" />
  </head>
  <body>
    <header>
      <div class="wrap">
        <h1 id="pageTitle">Las Canas Beach Retreat</h1>
        <p id="pageSubtitle">Group Organizer Portal</p>
        <div class="status-bar">
          <span id="progressLabel">Progress: 0%</span>
          <div class="progress-track"><div class="progress-fill" id="progressFill" style="width: 0%"></div></div>
        </div>
      </div>
    </header>

    <div id="errorBox" class="error-box wrap" hidden></div>

    <form id="portalForm" class="wrap" hidden>
      <section class="card">
        <h2>Basic Information</h2>
        <label>Group Name</label>
        <input name="groupName" required />
        <div class="grid2">
          <div>
            <label>Check-in Date</label>
            <input name="checkIn" type="date" />
          </div>
          <div>
            <label>Check-out Date</label>
            <input name="checkOut" type="date" />
          </div>
        </div>
        <div class="grid2">
          <div>
            <label>Total Guests</label>
            <input name="totalGuests" type="number" min="1" />
          </div>
          <div>
            <label>Adults</label>
            <input name="adults" type="number" min="0" />
          </div>
        </div>
        <label>Children</label>
        <input name="children" type="number" min="0" value="0" />
        <label>Event Type</label>
        <select name="eventType">
          <option value="">— select —</option>
          <option value="yoga_retreat">Yoga Retreat</option>
          <option value="wellness_retreat">Wellness Retreat</option>
          <option value="wedding">Wedding</option>
          <option value="family_reunion">Family Reunion</option>
          <option value="corporate_retreat">Corporate Retreat</option>
          <option value="surf_camp">Surf Camp</option>
          <option value="private_vacation">Private Vacation</option>
        </select>
        <label>Organizer Email</label>
        <input name="organizerEmail" type="email" />
      </section>

      <section class="card">
        <h2>Flights & Transfer</h2>
        <label>
          <input name="transferNeeded" type="checkbox" checked />
          Airport transfer needed
        </label>
        <div id="flightsList"></div>
        <button type="button" class="btn btn-secondary" id="addFlight">+ Add Flight</button>
      </section>

      <section class="card">
        <h2>Meals</h2>
        <p style="color: var(--muted); font-size: 0.9rem; margin-top: 0">
          Please share your meal preferences by day. Dietary restrictions go in a separate list below.
        </p>
        <div id="dietaryList"></div>
        <button type="button" class="btn btn-secondary" id="addDietary">+ Add Dietary Restriction</button>
        <hr style="border: none; border-top: 1px solid var(--border); margin: 1.25rem 0" />
        <div id="menuList"></div>
        <button type="button" class="btn btn-secondary" id="addMenuDay">+ Add Menu Day</button>
      </section>

      <section class="card">
        <h2>Activities</h2>
        <div id="activitiesList"></div>
        <button type="button" class="btn btn-secondary" id="addActivity">+ Add Activity</button>
      </section>

      <section class="card">
        <h2>Special Requests</h2>
        <textarea name="specialRequests" rows="4" placeholder="Anything important for your group's comfort…"></textarea>
      </section>

      <button type="submit" class="btn">Save</button>
    </form>

    <div class="toast" id="toast">Saved</div>

    <script>
      const params = new URLSearchParams(location.search)
      const pathMatch = location.pathname.match(/\/portal\/([^/]+)/)
      const slugFromPath = pathMatch && decodeURIComponent(pathMatch[1])
      const slug =
        params.get('slug') || slugFromPath || sessionStorage.getItem('portalSlug')
      const token = params.get('token') || sessionStorage.getItem('portalToken')

      if (slug) sessionStorage.setItem('portalSlug', slug)

      const errorBox = document.getElementById('errorBox')
      const form = document.getElementById('portalForm')
      let portalData = null

      function showError(msg) {
        errorBox.hidden = false
        errorBox.textContent = msg
        form.hidden = true
      }

      function setProgress(pct) {
        document.getElementById('progressLabel').textContent = `Progress: ${pct}%`
        document.getElementById('progressFill').style.width = `${pct}%`
      }

      function uid() {
        return Math.random().toString(36).slice(2, 10)
      }

      function flightTemplate(f = {}, key = uid()) {
        return `
          <div class="repeat-block" data-key="${key}" data-kind="flight">
            <button type="button" class="remove">Remove</button>
            <label>Direction</label>
            <select data-field="direction">
              <option value="arrival" ${f.direction === 'arrival' ? 'selected' : ''}>Arrival</option>
              <option value="departure" ${f.direction === 'departure' ? 'selected' : ''}>Departure</option>
            </select>
            <div class="grid2">
              <div><label>Flight Number</label><input data-field="flightNumber" value="${f.flightNumber || ''}" /></div>
              <div><label>Date</label><input data-field="date" type="date" value="${f.date || ''}" /></div>
            </div>
            <div class="grid2">
              <div><label>Time</label><input data-field="time" value="${f.time || ''}" /></div>
              <div><label>Airport</label>
                <select data-field="airport">
                  <option value="">—</option>
                  <option value="POP" ${f.airport === 'POP' ? 'selected' : ''}>POP</option>
                  <option value="PUJ" ${f.airport === 'PUJ' ? 'selected' : ''}>PUJ</option>
                  <option value="SDQ" ${f.airport === 'SDQ' ? 'selected' : ''}>SDQ</option>
                </select>
              </div>
            </div>
            <label>Passengers</label><input data-field="passengers" type="number" min="0" value="${f.passengers ?? ''}" />
            <label>Notes</label><input data-field="notes" value="${f.notes || ''}" />
          </div>`
      }

      function dietaryTemplate(d = {}, key = uid()) {
        return `
          <div class="repeat-block" data-key="${key}" data-kind="dietary">
            <button type="button" class="remove">Remove</button>
            <label>Guest Name</label><input data-field="guestName" value="${d.guestName || ''}" />
            <label>Restriction</label>
            <select data-field="restriction">
              <option value="vegetarian" ${d.restriction === 'vegetarian' ? 'selected' : ''}>Vegetarian</option>
              <option value="vegan" ${d.restriction === 'vegan' ? 'selected' : ''}>Vegan</option>
              <option value="gluten_free" ${d.restriction === 'gluten_free' ? 'selected' : ''}>Gluten-free</option>
              <option value="lactose_free" ${d.restriction === 'lactose_free' ? 'selected' : ''}>Lactose-free</option>
              <option value="allergy" ${d.restriction === 'allergy' ? 'selected' : ''}>Allergy</option>
              <option value="halal" ${d.restriction === 'halal' ? 'selected' : ''}>Halal</option>
              <option value="other" ${d.restriction === 'other' ? 'selected' : ''}>Other</option>
            </select>
            <label>Details</label><input data-field="details" value="${d.details || ''}" />
          </div>`
      }

      function menuTemplate(m = {}, key = uid()) {
        return `
          <div class="repeat-block" data-key="${key}" data-kind="menu">
            <button type="button" class="remove">Remove</button>
            <label>Date</label><input data-field="date" type="date" value="${m.date || ''}" />
            <label>Breakfast</label><textarea data-field="breakfast">${m.breakfast || ''}</textarea>
            <label>Lunch</label><textarea data-field="lunch">${m.lunch || ''}</textarea>
            <label>Dinner</label><textarea data-field="dinner">${m.dinner || ''}</textarea>
            <label>Notes</label><input data-field="notes" value="${m.notes || ''}" />
          </div>`
      }

      function syncMassageHints(root) {
        const scope = root || document
        scope.querySelectorAll('.repeat-block[data-kind="activity"]').forEach((block) => {
          const select = block.querySelector('[data-field="activity"]')
          const hint = block.querySelector('.activity-hint-massage')
          if (select && hint) hint.hidden = select.value !== 'massage'
        })
      }

      function activityTemplate(a = {}, key = uid()) {
        return `
          <div class="repeat-block" data-key="${key}" data-kind="activity">
            <button type="button" class="remove">Remove</button>
            <label>Activity</label>
            <select data-field="activity">
              <option value="gri_gri" ${a.activity === 'gri_gri' ? 'selected' : ''}>Laguna Gri Gri</option>
              <option value="playa_grande" ${a.activity === 'playa_grande' ? 'selected' : ''}>Playa Grande</option>
              <option value="kite_surfing" ${a.activity === 'kite_surfing' ? 'selected' : ''}>Kite Surfing</option>
              <option value="horse_riding" ${a.activity === 'horse_riding' ? 'selected' : ''}>Horse Riding</option>
              <option value="cultural_tour" ${a.activity === 'cultural_tour' ? 'selected' : ''}>Cultural Tour</option>
              <option value="yoga" ${a.activity === 'yoga' ? 'selected' : ''}>Yoga</option>
              <option value="massage" ${a.activity === 'massage' ? 'selected' : ''}>Massage</option>
              <option value="other" ${a.activity === 'other' ? 'selected' : ''}>Other</option>
            </select>
            <p class="activity-hint activity-hint-massage" ${a.activity === 'massage' ? '' : 'hidden'}>💆 Massage · 60 min · $60 USD per person</p>
            <label>Date</label><input data-field="date" type="date" value="${a.date || ''}" />
            <label>Participants</label><input data-field="guests" type="number" min="0" value="${a.guests ?? ''}" />
            <label>Notes</label><input data-field="notes" value="${a.notes || ''}" />
          </div>`
      }

      function collectRepeats(containerId, kind) {
        const items = []
        document.querySelectorAll(`#${containerId} .repeat-block[data-kind="${kind}"]`).forEach((el) => {
          const row = {_key: el.dataset.key}
          el.querySelectorAll('[data-field]').forEach((input) => {
            const name = input.dataset.field
            let val = input.type === 'checkbox' ? input.checked : input.value
            if (input.type === 'number' && val !== '') val = Number(val)
            if (val !== '' && val != null) row[name] = val
          })
          items.push(row)
        })
        return items
      }

      function fillForm(p) {
        portalData = p
        document.getElementById('pageTitle').textContent = p.groupName || 'Las Canas Beach Retreat'
        form.groupName.value = p.groupName || ''
        form.checkIn.value = p.checkIn || ''
        form.checkOut.value = p.checkOut || ''
        form.totalGuests.value = p.totalGuests ?? ''
        form.adults.value = p.adults ?? ''
        form.children.value = p.children ?? 0
        form.eventType.value = p.eventType || ''
        form.organizerEmail.value = p.organizerEmail || ''
        form.transferNeeded.checked = p.transferNeeded !== false
        form.specialRequests.value = p.specialRequests || ''
        setProgress(p.progressPercent ?? 0)

        const fl = document.getElementById('flightsList')
        fl.innerHTML = (p.flights || []).map((f) => flightTemplate(f, f._key || uid())).join('') || ''
        const di = document.getElementById('dietaryList')
        di.innerHTML = (p.dietaryRestrictions || []).map((d) => dietaryTemplate(d, d._key || uid())).join('')
        const mn = document.getElementById('menuList')
        mn.innerHTML = (p.menuPlan || []).map((m) => menuTemplate(m, m._key || uid())).join('') || ''
        const ac = document.getElementById('activitiesList')
        ac.innerHTML = (p.activities || []).map((a) => activityTemplate(a, a._key || uid())).join('') || ''
        syncMassageHints(ac)
      }

      document.getElementById('addFlight').onclick = () => {
        document.getElementById('flightsList').insertAdjacentHTML('beforeend', flightTemplate())
      }
      document.getElementById('addDietary').onclick = () => {
        document.getElementById('dietaryList').insertAdjacentHTML('beforeend', dietaryTemplate())
      }
      document.getElementById('addMenuDay').onclick = () => {
        document.getElementById('menuList').insertAdjacentHTML('beforeend', menuTemplate())
      }
      document.getElementById('addActivity').onclick = () => {
        const list = document.getElementById('activitiesList')
        list.insertAdjacentHTML('beforeend', activityTemplate())
        syncMassageHints(list)
      }

      document.getElementById('activitiesList').addEventListener('change', (e) => {
        if (!e.target.matches('[data-field="activity"]')) return
        const hint = e.target.closest('.repeat-block')?.querySelector('.activity-hint-massage')
        if (hint) hint.hidden = e.target.value !== 'massage'
      })

      document.body.addEventListener('click', (e) => {
        if (e.target.classList.contains('remove')) {
          e.target.closest('.repeat-block')?.remove()
        }
      })

      async function load() {
        if (!slug || !token) {
          showError(
            'Invalid or expired link. Please use the join link from Las Canas (ritaops.com/join/…).'
          )
          return
        }
        const res = await fetch(`/api/portal?slug=${encodeURIComponent(slug)}&token=${encodeURIComponent(token)}`)
        const json = await res.json()
        if (!res.ok) {
          showError(json.error || 'Failed to load portal')
          return
        }
        errorBox.hidden = true
        form.hidden = false
        fillForm(json.portal)
      }

      form.addEventListener('submit', async (e) => {
        e.preventDefault()
        const data = {
          groupName: form.groupName.value,
          checkIn: form.checkIn.value || null,
          checkOut: form.checkOut.value || null,
          totalGuests: form.totalGuests.value ? Number(form.totalGuests.value) : null,
          adults: form.adults.value ? Number(form.adults.value) : null,
          children: form.children.value ? Number(form.children.value) : 0,
          eventType: form.eventType.value || null,
          organizerEmail: form.organizerEmail.value || null,
          transferNeeded: form.transferNeeded.checked,
          specialRequests: form.specialRequests.value || null,
          flights: collectRepeats('flightsList', 'flight'),
          dietaryRestrictions: collectRepeats('dietaryList', 'dietary'),
          menuPlan: collectRepeats('menuList', 'menu'),
          activities: collectRepeats('activitiesList', 'activity')
        }
        const res = await fetch('/api/portal', {
          method: 'POST',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({slug, token, data})
        })
        const json = await res.json()
        if (!res.ok) {
          alert(json.error || 'Save error')
          return
        }
        setProgress(json.progressPercent)
        const toast = document.getElementById('toast')
        toast.classList.add('show')
        setTimeout(() => toast.classList.remove('show'), 2500)
      })

      load()
    </script>
  </body>
</html>
