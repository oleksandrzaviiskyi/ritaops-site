<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RITA · Living Operations</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900&display=swap" rel="stylesheet">
<style>
:root{
  --bg1:#fffdf7;--bg2:#fff4df;--bg3:#ffdca6;
  --ink:#111111;--ink-soft:#5f594f;--ink-faint:rgba(17,17,17,.42);
  --line:rgba(40,30,18,.13);--line-soft:rgba(40,30,18,.06);
  --orange:#d98a2b;
  --maintenance:#a06b0a;--cleaning:#2F6FB0;--attention:#b83c0d;--ok:#3a7a55;
  --surface:rgba(255,253,247,.86);
  --grid:rgba(40,30,18,.045);
  --panel:440px;
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;overflow:hidden;}
body{
  color:var(--ink);
  font-family:"Inter",system-ui,sans-serif;
  font-size:15px;line-height:1.5;
  -webkit-font-smoothing:antialiased;
  background:
    radial-gradient(circle at 50% 32%,rgba(255,255,255,.90),transparent 26%),
    radial-gradient(circle at 48% 54%,rgba(255,145,22,.18),transparent 34%),
    radial-gradient(circle at 12% 88%,rgba(217,138,43,.10),transparent 30%),
    linear-gradient(180deg,var(--bg1) 0%,var(--bg2) 48%,var(--bg3) 100%);
  background-attachment:fixed;
}
body::before{
  content:"";position:fixed;inset:0;pointer-events:none;z-index:0;
  background:
    linear-gradient(90deg,var(--grid) 1px,transparent 1px),
    linear-gradient(180deg,var(--grid) 1px,transparent 1px);
  background-size:72px 72px;
  mask-image:radial-gradient(circle at 50% 42%,black,transparent 78%);
  -webkit-mask-image:radial-gradient(circle at 50% 42%,black,transparent 78%);
}
.corner-logo{position:fixed;top:18px;left:22px;display:flex;align-items:center;gap:10px;z-index:10;}
.corner-logo img{
  width:68px;height:auto;flex:none;
  animation:float 7s ease-in-out infinite;
  filter:drop-shadow(0 8px 20px rgba(217,138,43,.22));
}
.corner-logo .brand{display:flex;flex-direction:column;line-height:1.25;}
.corner-logo .mark{font-weight:600;letter-spacing:0.13em;font-size:16px;color:var(--ink);}
.corner-logo .sub{color:var(--ink-soft);font-size:10.5px;font-weight:400;}
@keyframes float{0%,100%{transform:translateY(0) rotate(-.6deg);}50%{transform:translateY(-12px) rotate(.7deg);}}
.summon{
  position:fixed;bottom:24px;right:24px;z-index:10;
  display:flex;align-items:center;gap:9px;
  background:#111;border:none;border-radius:999px;
  padding:11px 20px 11px 14px;cursor:pointer;
  filter:drop-shadow(0 8px 22px rgba(17,17,17,.22));
  transition:transform .18s,filter .18s;
  font-family:inherit;
}
.summon:hover{transform:translateY(-2px);filter:drop-shadow(0 12px 28px rgba(17,17,17,.28));}
body[data-panel="open"] .summon{opacity:0;pointer-events:none;transition:opacity .2s;}
.summon .dot{width:9px;height:9px;border-radius:50%;background:#4caf50;flex:none;}
.summon .lbl{font-size:14px;font-weight:500;letter-spacing:0.08em;color:#fffaf0;}
.layout{position:fixed;inset:0;z-index:1;display:flex;pointer-events:none;}
.cards-area{flex:1;overflow:auto;pointer-events:auto;position:relative;z-index:12;min-height:100%;}
.cards-area::-webkit-scrollbar{width:4px;}
.cards-area::-webkit-scrollbar-thumb{background:var(--line);border-radius:4px;}
.rita-panel{
  width:var(--panel);flex:none;height:100%;
  display:flex;flex-direction:column;
  background:var(--surface);
  border-left:1px solid transparent;
  backdrop-filter:blur(18px);-webkit-backdrop-filter:blur(18px);
  transform:translateX(100%);
  transition:transform .28s cubic-bezier(.2,.7,.2,1),border-color .28s;
  pointer-events:auto;
  position:relative;
}
body[data-panel="open"] .rita-panel{border-left-color:var(--line);}
body[data-panel="open"] .rita-panel{transform:none;}
.panel-head{
  padding:18px 16px 14px;
  border-bottom:1px solid var(--line-soft);
  display:flex;align-items:center;justify-content:space-between;
  flex:none;
}
.panel-head .ptitle{display:flex;align-items:center;gap:8px;}
.panel-head .dot{width:8px;height:8px;border-radius:50%;background:#4caf50;flex:none;}
.panel-head .pname{font-weight:600;letter-spacing:0.10em;font-size:13px;color:var(--ink);}
.panel-head .close-p{width:26px;height:26px;border-radius:8px;border:1px solid var(--line);
  background:rgba(255,253,247,.5);cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;color:var(--ink-soft);font-family:inherit;transition:.15s;}
.panel-head .close-p:hover{border-color:var(--orange);color:var(--ink);}

.chat-area{flex:1;overflow-y:auto;padding:14px 14px 0;display:flex;flex-direction:column;gap:10px;}
.chat-area::-webkit-scrollbar{width:3px;}
.chat-area::-webkit-scrollbar-thumb{background:var(--line);border-radius:3px;}
.msg-rita{font-size:13px;color:var(--ink-soft);line-height:1.5;padding:10px 12px;
  background:rgba(255,253,247,.5);border:1px solid var(--line-soft);border-radius:12px;}
.msg-rita b{font-weight:500;color:var(--orange);}
.msg-you{font-size:13px;color:var(--ink);line-height:1.5;padding:9px 12px;
  background:rgba(17,17,17,.06);border-radius:12px;align-self:flex-end;max-width:90%;}
.panel-input{flex:none;padding:12px 14px 16px;border-top:1px solid var(--line-soft);}
.inp-wrap{display:flex;align-items:center;gap:8px;border:1px solid var(--line);border-radius:12px;
  padding:8px 8px 8px 12px;background:rgba(255,253,247,.55);}
.inp-wrap .rdot{width:7px;height:7px;border-radius:2px;background:var(--orange);flex:none;}
.inp-wrap input,.inp-wrap textarea{flex:1;border:none;background:none;outline:none;font-family:inherit;font-size:14px;color:var(--ink);}
.inp-wrap input::placeholder,.inp-wrap textarea::placeholder{color:var(--ink-faint);}
.inp-wrap .go{width:28px;height:28px;border-radius:8px;border:none;background:var(--ink);
  color:#fffaf0;cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;font-family:inherit;transition:.15s;}
.inp-wrap .go:hover{opacity:.8;}
.inp-wrap .go:disabled{opacity:.45;cursor:default;}
.inp-wrap .attach{width:28px;height:28px;border-radius:8px;border:1px solid var(--line);
  background:none;color:var(--ink-soft);cursor:pointer;font-size:14px;display:flex;align-items:center;
  justify-content:center;font-family:inherit;transition:.15s;flex:none;}
.inp-wrap .attach:hover{border-color:var(--orange);color:var(--orange);}
.inp-wrap .attach.has-file{border-color:var(--ok);color:var(--ok);}
.pdf-badge{font-size:11px;color:var(--ok);padding:2px 6px;background:rgba(58,122,85,.08);
  border-radius:6px;white-space:nowrap;max-width:120px;overflow:hidden;text-overflow:ellipsis;flex:none;}
.field{position:relative;width:100%;min-height:100vh;}
.field-top{display:none!important;}
.tray{position:fixed;top:88px;left:22px;display:flex;flex-direction:column;gap:6px;z-index:8;pointer-events:auto;}
.tray-chip{display:inline-flex;align-items:center;gap:7px;font-size:12px;color:var(--ink-soft);
  background:rgba(255,253,247,.88);border:1px solid var(--line);border-radius:10px;padding:6px 12px;
  cursor:pointer;font-family:inherit;transition:.15s;backdrop-filter:blur(12px);
  box-shadow:0 2px 10px rgba(40,30,18,.07);white-space:nowrap;}
.tray-chip:hover{border-color:var(--orange);color:var(--ink);}
.tray-chip .d{width:6px;height:6px;border-radius:50%;background:var(--orange);flex:none;}

.card{background:var(--surface);border:1px solid var(--line);border-radius:20px;padding:16px 16px 13px;
  backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);
  filter:drop-shadow(0 2px 16px rgba(40,30,18,.07));
  animation:rise .36s cubic-bezier(.2,.7,.2,1) both;position:absolute;overflow:hidden;z-index:12;width:300px;}
.card.expanded{box-shadow:0 8px 32px rgba(40,30,18,.12);}
.card.card-today{border-color:rgba(217,138,43,.35);border-width:1.5px;}
.card.card-today .eyebrow{color:var(--orange);}
.card.card-today::before{content:"";position:absolute;top:0;left:0;width:100%;height:3px;background:var(--orange);}
.card.closing{animation:fade .22s ease forwards;}
.card.woken::before{content:"";position:absolute;top:0;left:0;width:100%;height:3px;background:var(--orange);}
.card.loading .rows{opacity:.55;}
@keyframes rise{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:none;}}
@keyframes fade{to{opacity:0;transform:translateY(5px) scale(.99);}}
.card-head{display:flex;align-items:flex-start;justify-content:space-between;gap:8px;}
.eyebrow{font-size:10px;letter-spacing:0.10em;text-transform:uppercase;color:var(--ink-faint);margin-bottom:3px;font-weight:500;}
.card-head h3{font-weight:520;font-size:16px;letter-spacing:-.03em;color:var(--ink);}
.ctrls{display:flex;gap:4px;flex:none;}
.ic{width:24px;height:24px;border-radius:7px;border:1px solid var(--line);
  background:rgba(255,253,247,.5);color:var(--ink-faint);
  cursor:pointer;font-size:13px;display:flex;align-items:center;justify-content:center;
  font-family:inherit;transition:.14s;}
.ic:hover{border-color:var(--orange);color:var(--ink);}
.why{font-size:11.5px;color:var(--orange);margin:7px 0 1px;line-height:1.4;font-weight:500;}
.rows{margin-top:11px;display:flex;flex-direction:column;}
.row{display:flex;align-items:baseline;gap:8px;padding:4px 0;border-top:1px solid var(--line-soft);}
.row:first-child{border-top:none;}
.row .k{flex:none;width:100px;color:var(--ink-soft);font-size:11.5px;font-weight:400;}
.row .v{flex:1;color:var(--ink);font-size:13px;}
.row .v small{color:var(--ink-faint);font-size:11px;}
.tag{font-size:11px;font-weight:500;}
.tag.ok{color:var(--ok);}.tag.maintenance{color:var(--maintenance);}
.tag.cleaning{color:var(--cleaning);}.tag.attention{color:var(--attention);}.tag.faint{color:var(--ink-faint);}
.note{color:var(--ink-faint);font-size:11px;margin-top:8px;line-height:1.45;}
.log{margin-top:10px;display:flex;flex-direction:column;gap:5px;max-height:0;overflow:hidden;transition:max-height .3s ease;}
.card.has-log .log{max-height:600px;}
.logline{font-size:11.5px;line-height:1.4;border-left:2px solid var(--line);padding-left:8px;}
.logline.you{color:var(--ink);}.logline.rita{color:var(--ink-soft);border-left-color:var(--orange);}
.logline b{font-weight:500;}.logline .to{color:var(--orange);font-weight:500;}
.composer{display:flex;align-items:center;gap:6px;margin-top:11px;
  border:1px solid var(--line);border-radius:10px;padding:5px 5px 5px 9px;
  background:rgba(255,253,247,.45);}
.composer select{border:none;background:none;font-family:inherit;font-size:11.5px;color:var(--ink-soft);outline:none;max-width:160px;cursor:pointer;}
.composer .leader-tag{font-size:10px;color:var(--ok);background:rgba(58,122,85,.1);border-radius:4px;padding:1px 5px;margin-left:2px;}
.composer input{flex:1;border:none;background:none;outline:none;font-family:inherit;font-size:12.5px;color:var(--ink);min-width:0;}
.composer input::placeholder{color:var(--ink-faint);}
.composer .send{flex:none;width:26px;height:26px;border-radius:7px;border:none;
  background:var(--ink);color:#fffaf0;cursor:pointer;font-size:13px;display:flex;align-items:center;justify-content:center;transition:.14s;}
.composer .send:hover{opacity:.8;}
.composer .send:disabled{opacity:.45;cursor:default;}
.task-row{margin-top:9px;}
.resolve{font-size:11.5px;color:var(--ok);background:none;border:1px solid rgba(58,122,85,.28);
  border-radius:999px;padding:6px 16px;cursor:pointer;font-family:inherit;transition:.2s;font-weight:500;}
.resolve:hover{border-color:var(--ok);background:rgba(58,122,85,.06);}
.resolve:disabled{opacity:.6;cursor:default;}
</style>
</head>
<body data-state="rest" data-panel="closed">

<div class="tray" id="tray"></div>
<div class="corner-logo">
  <img src="/floating-orange.png" alt="RITA" width="68" height="68">
  <span class="brand">
    <span class="mark">RITA</span>
    <span class="sub">Las Canas Beach Retreat</span>
  </span>
</div>

<div class="layout">
  <div class="cards-area" id="cardsArea">
    <div class="field" id="field"></div>
  </div>

  <div class="rita-panel" id="ritaPanel">
    <div class="panel-head">
      <div class="ptitle">
        <span class="dot"></span>
        <span class="pname">RITA</span>
      </div>
      <button class="close-p" id="closePanel" type="button" aria-label="Close panel">×</button>
    </div>



    <div class="chat-area" id="chatArea">
      <div class="msg-rita"><b>Рита:</b> Доброе утро. Открой область слева или задай вопрос — я на связи.</div>
    </div>

    <div class="panel-input">
      <input type="file" id="panelFile" accept=".pdf" style="display:none">
      <div class="inp-wrap">
        <span class="rdot"></span>
        <span class="pdf-badge" id="pdfBadge" style="display:none"></span>
        <textarea id="panelInput" placeholder="Спросить Риту…" autocomplete="off" rows="1" style="flex:1;border:none;background:none;outline:none;font-family:inherit;font-size:14px;color:var(--ink);resize:none;overflow:hidden;line-height:1.5;max-height:140px;padding:0;"></textarea>
        <button class="attach" id="panelAttach" type="button" title="Прикрепить PDF">📎</button>
        <button class="go" id="panelSend" type="button" aria-label="Send">→</button>
      </div>
    </div>
  </div>
</div>

<button class="summon" id="summon" type="button">
  <span class="dot"></span>
  <span class="lbl">RITA</span>
</button>

<script>
(function () {
  'use strict'

  const STAFF_KEY = 'rita2026'
  const AUTH_HEADERS = {
    'Content-Type': 'application/json',
    Authorization: 'Bearer ' + STAFF_KEY
  }
  const R = 'Рите'
  const QUESTIONS_POLL_MS = 60000

  // Load chat history from localStorage
  let chatHistory = []
  try {
    const saved = localStorage.getItem('rita_chat_history_v2')
    if (saved) {
      const parsed = JSON.parse(saved)
      if (Array.isArray(parsed)) {
        // filter out empty messages
        chatHistory = parsed
          .filter(function(m) { return m && m.content && String(m.content).trim().length > 0 })
          .slice(-30)
      }
    }
  } catch(e) {}

  function saveChatHistory() {
    try { localStorage.setItem('rita_chat_history_v2', JSON.stringify(chatHistory.slice(-30))) } catch(e) {}
  }
  let questionsTimer = null
  let pulseCache = null
  let portalsCache = null

  const field = document.getElementById('field')
  const tray = document.getElementById('tray')
  const fieldTop = {style: {display: ''}}

  const chatArea = document.getElementById('chatArea')
  const shown = []

  function esc(s) {
    return String(s ?? '').replace(/[&<>]/g, (c) => ({'&': '&amp;', '<': '&lt;', '>': '&gt;'}[c]))
  }

  function tag(cls, text) {
    return '<span class="tag ' + cls + '">' + esc(text) + '</span>'
  }

  function isTag(s) {
    return typeof s === 'string' && s.indexOf('class="tag') > -1
  }

  function formatBalance(status) {
    if (!status) return '—'
    return String(status)
      .split('-')
      .map((p) => p.charAt(0).toUpperCase() + p.slice(1))
      .join(' ')
  }

  function fmtDate(iso) {
    if (!iso) return '—'
    const d = new Date(iso + 'T12:00:00')
    if (Number.isNaN(d.getTime())) return iso
    return d.toLocaleDateString('en-GB', {day: 'numeric', month: 'short'})
  }

  function todayIso() {
    return new Date().toISOString().slice(0, 10)
  }

  function apiUrl(path) {
    const sep = path.includes('?') ? '&' : '?'
    return path + sep + 'key=' + encodeURIComponent(STAFF_KEY)
  }

  async function apiGet(path) {
    const res = await fetch(apiUrl(path), {headers: AUTH_HEADERS})
    const json = await res.json().catch(() => ({}))
    if (!res.ok) throw new Error('HTTP ' + res.status + ': ' + (json.error || json.message || res.statusText || 'Request failed'))
    return json
  }

  async function apiPost(path, body) {
    const res = await fetch(path, {
      method: 'POST',
      headers: AUTH_HEADERS,
      body: JSON.stringify({...body, staffKey: STAFF_KEY})
    })
    const json = await res.json().catch(() => ({}))
    if (!res.ok) throw new Error('HTTP ' + res.status + ': ' + (json.error || json.message || res.statusText || 'Request failed'))
    return json
  }

  const CARDS = {
    arrivals: {
      eyebrow: 'Arrivals',
      title: 'Groups today',
      span: false,
      task: false,
      live: true,
      recipients: [R, 'Groups'],
      rows: [['Loading', '…', '']],
      note: ''
    },
    kitchen: {
      eyebrow: 'Readiness',
      title: 'Restaurant & Bar',
      span: false,
      task: false,
      recipients: [R, 'Kitchen · Charina', 'Restaurant · Suleimi'],
      rows: [
        ['Kitchen', 'Charina', 'owns domain'],
        ['Restaurant', 'Suleimi', 'owns domain'],
        ['Menu', tag('attention', 'draft'), 'no group menu yet'],
        ['Bar stock', tag('faint', 'no data'), 'awaiting Poster POS']
      ],
      note: 'Live data coming soon.'
    },
    purchase: {
      eyebrow: 'Purchases · Diomedes',
      title: 'Purchase list · this week',
      span: false,
      task: true,
      recipients: [R, 'Purchases · Diomedes'],
      rows: [
        ['Coffee beans', '5 kg', tag('attention', 'low')],
        ['Plantains', '20 kg', 'for groups'],
        ['Bar tonic', '48 u', tag('attention', 'low')],
        ['Cleaning', '—', tag('ok', 'ok')]
      ],
      note: 'Live data coming soon.'
    },
    responsibility: {
      eyebrow: 'Who carries what',
      title: 'Responsibility',
      span: false,
      task: false,
      recipients: [R],
      rows: [
        ['Operations', 'Yasper · Alex', 'Steward'],
        ['Kitchen', 'Charina', 'Own'],
        ['Restaurant', 'Suleimi', 'Own'],
        ['Finance', 'Renate', 'Own'],
        ['Inventory', 'Diomedes', 'Own']
      ],
      note: 'Live data coming soon. Shift coverage not tracked yet.'
    },
    risks: {
      eyebrow: 'Needs watching',
      title: 'Risks',
      span: false,
      task: true,
      live: true,
      recipients: [R],
      rows: [['Open concerns', '…', '']],
      note: ''
    },
    pulse: {
      eyebrow: 'Today',
      title: 'Las Canas',
      span: false,
      task: false,
      live: true,
      recipients: [R],
      rows: [['Balance', '…', ''], ['Field', '…', '']],
      note: ''
    },
    bar: {
      eyebrow: 'Maintenance',
      title: 'Bar · кран',
      span: false,
      task: true,
      live: true,
      recipients: [R, 'Maintenance'],
      rows: [['Место', 'Bar', ''], ['Проблема', tag('attention', 'течёт кран'), 'обслуживание не начато']],
      note: ''
    }
  }

  function rowHtml(r) {
    const v = isTag(r[1]) ? r[1] : esc(r[1])
    const s = r[2] ? ' <small>· ' + (isTag(r[2]) ? r[2] : esc(r[2])) + '</small>' : ''
    return '<div class="row"><div class="k">' + esc(r[0]) + '</div><div class="v">' + v + s + '</div></div>'
  }

  function renderCard(key, why, extraClass) {
    const d = CARDS[key]
    if (!d) return ''
    const rows = d.rows.map(rowHtml).join('')
    const recipients = d.recipients || [R]
    const opts = recipients.map((r) => '<option value="' + esc(r) + '">' + esc(r) + '</option>').join('')
    let h = '<div class="card' + (why ? ' woken' : '') + (extraClass ? ' ' + extraClass : '') + '" id="card-' + key + '" data-key="' + key + '">'
    h += '<div class="card-head"><div>'
    if (d.eyebrow) h += '<div class="eyebrow">' + esc(d.eyebrow) + '</div>'
    h += '<h3 id="card-title-' + key + '">' + esc(d.title) + '</h3></div>'
    h += '<div class="ctrls"><button class="ic" data-act="min" type="button" title="Свернуть">–</button>'
      + '<button class="ic" data-act="close" type="button" title="Закрыть">×</button></div></div>'
    if (why) h += '<div class="why" id="card-why-' + key + '">' + esc(why) + '</div>'
    else h += '<div class="why" id="card-why-' + key + '" hidden></div>'
    h += '<div class="rows" id="card-rows-' + key + '">' + rows + '</div>'
    h += '<div class="note" id="card-note-' + key + '">' + esc(d.note || '') + '</div>'
    h += '<div class="log" id="log-' + key + '"></div>'
    h += '<div class="composer"><select aria-label="Кому">' + opts + '</select>'
      + '<input placeholder="Написать…" aria-label="Сообщение">'
      + '<button class="send" data-act="send" type="button">→</button></div>'
    if (d.task) h += '<div class="task-row"><button class="resolve" data-act="resolve" type="button">✓ Задача закрыта</button></div>'
    h += '</div>'
    return h
  }

  function updateCardDom(key) {
    const d = CARDS[key]
    const titleEl = document.getElementById('card-title-' + key)
    const rowsEl = document.getElementById('card-rows-' + key)
    const noteEl = document.getElementById('card-note-' + key)
    const eyebrowEl = document.querySelector('#card-' + key + ' .eyebrow')
    if (titleEl) titleEl.textContent = d.title
    if (eyebrowEl) eyebrowEl.textContent = d.eyebrow
    if (rowsEl) rowsEl.innerHTML = d.rows.map(rowHtml).join('')
    if (noteEl) noteEl.textContent = d.note || ''
  }

  function setCardWhy(key, why) {
    const el = document.getElementById('card-why-' + key)
    if (!el) return
    if (why) {
      el.textContent = why
      el.hidden = false
      document.getElementById('card-' + key)?.classList.add('woken')
    } else {
      el.hidden = true
    }
  }

  async function loadPulseData() {
    const data = await apiGet('/api/ops-pulse')
    pulseCache = data
    if (typeof lfRefreshBubblesFromLive === 'function') lfRefreshBubblesFromLive()
    return data
  }

  function applyPulseToCard(data) {
    const pulse = data?.pulse || {}
    const concerns = Array.isArray(data?.concerns) ? data.concerns : []
    const balance = formatBalance(pulse.balanceStatus)
    const concernCount = concerns.length
    const fieldLabel = concernCount
      ? tag('attention', concernCount + ' open')
      : tag('ok', 'all clear')

    CARDS.pulse.eyebrow = 'Today · Pulse'
    CARDS.pulse.title = 'Las Canas Beach Retreat'
    CARDS.pulse.rows = [
      ['Balance', tag('ok', balance.toLowerCase()), 'hotel load tier'],
      ['Field', fieldLabel, concernCount ? 'open concerns' : 'no open concerns'],
      ['Concerns', String(concernCount), concernCount === 1 ? 'needs attention' : 'total open']
    ]
    CARDS.pulse.note = pulse.coherenceStatement?.trim() || ''
    updateCardDom('pulse')
  }

  async function refreshPulseCard() {
    const card = document.getElementById('card-pulse')
    if (card) card.classList.add('loading')
    try {
      const data = pulseCache || await loadPulseData()
      applyPulseToCard(data)
    } catch (err) {
      CARDS.pulse.note = 'Could not load pulse: ' + err.message
      updateCardDom('pulse')
    } finally {
      document.getElementById('card-pulse')?.classList.remove('loading')
    }
  }

  async function loadPortalsData() {
    const data = await apiGet('/api/portals')
    portalsCache = data.portals || []
    return portalsCache
  }

  function daysUntil(checkIn) {
    const d1 = new Date(todayIso() + 'T12:00:00')
    const d2 = new Date(checkIn + 'T12:00:00')
    return Math.round((d2 - d1) / 86400000)
  }

  function portalGroupId(portal) {
    if (portal.groupId) return portal.groupId
    const fromPulse = (pulseCache?.portals || []).find(function (p) {
      return p._id === portal._id || p.groupName === portal.groupName
    })
    return fromPulse?.groupId || null
  }

  function findRoomingList(group) {
    const lists = pulseCache?.roomingLists || []
    if (!group) return null
    const gid = portalGroupId(group)
    return lists.find(function (r) {
      return r.groupId === gid ||
        r.relatedGroupRef === group._id ||
        r.groupId === (group.groupName || '').replace(/\D/g, '').slice(-6)
    }) || null
  }

  function hasArrivalsToday(portals) {
    const today = todayIso()
    return (portals || []).some(function (p) {
      return p.checkIn === today && p.status !== 'cancelled'
    })
  }

  function syncArrivalsCardClass(portals) {
    const card = document.getElementById('card-arrivals')
    if (!card) return
    card.classList.toggle('card-today', hasArrivalsToday(portals))
  }

  function roomingStatusText(portal) {
    const core = portal.progressSections?.core ?? portal.progressPercent ?? 0
    if (core >= 80) return 'ready'
    if (core >= 40) return 'in progress'
    return 'pending'
  }

  function applyArrivalsToCard(portals) {
    const today = todayIso()
    const arriving = portals.filter(function (p) {
      return p.checkIn === today && p.status !== 'cancelled'
    })
    const upcoming = portals.filter(function (p) {
      if (!p.checkIn || p.checkIn <= today || p.status === 'cancelled') return false
      const n = daysUntil(p.checkIn)
      return n >= 1 && n <= 3
    })

    if (!arriving.length && !upcoming.length) {
      CARDS.arrivals.eyebrow = 'Arrivals · ' + fmtDate(today)
      CARDS.arrivals.title = 'No groups today'
      CARDS.arrivals.rows = [['Groups', tag('ok', 'clear'), 'no check-ins scheduled']]
      CARDS.arrivals.note = 'Live data from portals.'
      updateCardDom('arrivals')
      syncArrivalsCardClass(portals)
      return
    }

    if (arriving.length) {
      const g = arriving[0]
      const rooming = findRoomingList(g)
      const roomRows = []

      if (rooming && rooming.rooms) {
        rooming.rooms.slice(0, 8).forEach(function (rm) {
          const names = (rm.occupants || []).map(function (o) { return o.name }).join(', ')
          roomRows.push(['Room ' + rm.roomNumber, rm.roomType, names])
        })
      }

      // Find group leader — first single room occupant
      const leaderRoom = rooming && rooming.rooms ? rooming.rooms.find(function(rm) {
        return rm.occupants && rm.occupants.length === 1
      }) : null
      const leaderName = leaderRoom ? (leaderRoom.occupants[0].name || '') : ''
      const contactPhone = g.contactPhone || ''
      const leaderLabel = leaderName
        ? leaderName + (contactPhone ? ' · ' + contactPhone : '')
        : 'Group Leader'
      CARDS.arrivals.recipients = [R, leaderLabel]
      CARDS.arrivals.groupLeader = {name: leaderName, phone: contactPhone}

      CARDS.arrivals.eyebrow = 'ARRIVING TODAY · ' + fmtDate(today)
      CARDS.arrivals.title = (g.groupName || g.title || 'Group') + ' · ' + (g.totalGuests || '—') + ' guests'
      CARDS.arrivals.rows = [
        ['Группа', g.groupName || g.title || 'Group', ''],
        ['Даты', fmtDate(g.checkIn) + ' → ' + fmtDate(g.checkOut), ''],
        ['Гости', String(g.totalGuests || '—'), 'check-in today'],
        ['Лидер', leaderName || '—', contactPhone ? '📞 ' + contactPhone : ''],
        ['Руминг', rooming && rooming.rooms ? rooming.rooms.length + ' комнат' : tag('attention', 'не загружен'), ''],
        ...roomRows
      ]
      CARDS.arrivals.note = rooming
        ? 'Rooming loaded · ' + (rooming.totalOccupants || '—') + ' guests assigned.'
        : 'Rooming list not loaded yet — ask Rita to pull the latest.'
    } else {
      const primary = upcoming[0]
      const n = daysUntil(primary.checkIn)
      CARDS.arrivals.eyebrow = upcoming.length === 1
        ? 'IN ' + n + ' DAYS · ' + fmtDate(primary.checkIn)
        : 'UPCOMING · 1–3 DAYS'
      CARDS.arrivals.title = upcoming.length === 1
        ? (primary.groupName || 'Group')
        : upcoming.length + ' groups'
      CARDS.arrivals.rows = upcoming.slice(0, 6).map(function (p) {
        return [
          p.groupName || 'Group',
          fmtDate(p.checkIn) + ' → ' + fmtDate(p.checkOut),
          (p.totalGuests || '—') + ' guests'
        ]
      })
      CARDS.arrivals.note = 'Next arrivals from live portal data.'
    }

    updateCardDom('arrivals')
    syncArrivalsCardClass(portals)
  }

  async function refreshArrivalsCard() {
    const card = document.getElementById('card-arrivals')
    if (card) card.classList.add('loading')
    try {
      if (!pulseCache) await loadPulseData()
      const portals = portalsCache || await loadPortalsData()
      applyArrivalsToCard(portals)
    } catch (err) {
      CARDS.arrivals.note = 'Could not load groups: ' + err.message
      updateCardDom('arrivals')
    } finally {
      document.getElementById('card-arrivals')?.classList.remove('loading')
    }
  }

  async function refreshRisksCard() {
    try {
      const data = pulseCache || await loadPulseData()
      const concerns = Array.isArray(data?.concerns) ? data.concerns : []
      if (!concerns.length) {
        CARDS.risks.rows = [['Field', tag('ok', 'all clear'), 'no open concerns']]
      } else {
        CARDS.risks.rows = concerns.slice(0, 5).map((c) => {
          const place = c.relatedPlace?.name || c.relatedPlace?.unitCode || 'Place'
          const hours = c.openedAt ? Math.round((Date.now() - new Date(c.openedAt)) / 3600000) + 'h' : ''
          return [place, tag('attention', 'open'), hours || 'in progress']
        })
      }
      updateCardDom('risks')
    } catch (err) {
      CARDS.risks.note = 'Could not load risks: ' + err.message
      updateCardDom('risks')
    }
  }

  async function wake(key, why) {
    if (!CARDS[key]) return

    if (shown.indexOf(key) > -1) {
      if (why) setCardWhy(key, why)
      if (key === 'pulse') refreshPulseCard()
      if (key === 'arrivals') refreshArrivalsCard()
      if (key === 'risks') refreshRisksCard()
      return
    }

    const portals = pulseCache?.portals || portalsCache || []
    const isToday = key === 'arrivals' && hasArrivalsToday(portals)
    const cardIndex = shown.length
    const col = cardIndex % 3
    const row = Math.floor(cardIndex / 3)
    const startLeft = 20 + col * 320
    const startTop = 20 + row * 40
    field.insertAdjacentHTML('beforeend', renderCard(key, why || null, isToday ? 'card-today' : ''))
    shown.push(key)
    const placedCard = document.getElementById('card-' + key)
    if (placedCard) {
      let maxBottom = 20
      field.querySelectorAll('.card').forEach(function(c) {
        if (c === placedCard) return
        const b = parseInt(c.style.top || 0) + c.offsetHeight + 16
        if (b > maxBottom) maxBottom = b
      })
      placedCard.style.left = '20px'
      placedCard.style.top = maxBottom + 'px'
    }


    if (key === 'pulse') await refreshPulseCard()
    if (key === 'arrivals') await refreshArrivalsCard()
    if (key === 'risks') await refreshRisksCard()

    // Make card draggable
    const newCard = document.getElementById('card-' + key)
    if (newCard) makeDraggableCard(newCard)
  }

  function makeDraggableCard(card) {
    const head = card.querySelector('.card-head')
    if (!head) return
    let ox = 0, oy = 0, dragging = false
    head.style.cursor = 'move'

    head.addEventListener('mousedown', function (e) {
      if (e.target.closest('[data-act]')) return
      const fieldRect = field.getBoundingClientRect()
      const cardRect = card.getBoundingClientRect()
      // convert to field-relative coords
      card.style.left = (cardRect.left - fieldRect.left + field.parentElement.scrollLeft) + 'px'
      card.style.top = (cardRect.top - fieldRect.top + field.parentElement.scrollTop) + 'px'
      ox = e.clientX - cardRect.left
      oy = e.clientY - cardRect.top
      dragging = true
      card.style.zIndex = '60'
      card.style.width = cardRect.width + 'px'
      e.preventDefault()
    })

    document.addEventListener('mousemove', function (e) {
      if (!dragging) return
      const fieldRect = field.getBoundingClientRect()
      const panelW = document.body.getAttribute('data-panel') === 'open'
        ? (parseInt(getComputedStyle(document.documentElement).getPropertyValue('--panel')) || 440) : 0
      const maxX = window.innerWidth - panelW - card.offsetWidth - 8
      let nx = e.clientX - ox - fieldRect.left + field.parentElement.scrollLeft
      let ny = e.clientY - oy - fieldRect.top + field.parentElement.scrollTop
      nx = Math.max(8, Math.min(nx, maxX))
      ny = Math.max(8, ny)
      card.style.left = nx + 'px'
      card.style.top = ny + 'px'
      // expand canvas if dragged below viewport
      const bottom = ny + card.offsetHeight + 40
      if (bottom > field.offsetHeight) field.style.minHeight = bottom + 'px'
    })

    document.addEventListener('mouseup', function () {
      if (dragging) card.style.zIndex = '12'
      dragging = false
    })
  }

  function resolveCard(key) {
    // transition bubble to stage 2 (flower of life)
    if (typeof lfSetBubbleResolved === 'function') {
      lfSetBubbleResolved(key)
    }
    // update resolve button UI
    const card = document.getElementById('card-' + key)
    if (card) {
      const btn = card.querySelector('.resolve')
      if (btn) {
        btn.textContent = '✓ Решено — цветок жизни'
        btn.style.color = 'var(--ok)'
        btn.style.borderColor = 'var(--ok)'
        btn.disabled = true
      }
      // send message to Rita about resolution
      apiPost('/api/rita-chat', {
        message: 'Задача закрыта: ' + (CARDS[key]?.title || key),
        history: [],
        liveData: buildLiveContext()
      }).then(function(json) {
        logLine(key, 'rita', '<b>Рита:</b> ' + esc(json.reply || 'Приняла.'))
      }).catch(function(){})
    }
    // remove card after bubble animation (2.5s)
    setTimeout(function() { removeCard(key) }, 2500)
  }

  function removeCard(key) {
    const c = document.getElementById('card-' + key)
    const chip = tray.querySelector('[data-key="' + key + '"]')
    if (chip) chip.remove()
    if (c) {
      c.classList.add('closing')
      setTimeout(function () {
        if (c.parentNode) c.parentNode.removeChild(c)
        afterRemove(key)
      }, 200)
    } else {
      afterRemove(key)
    }
  }

  function afterRemove(key) {
    const i = shown.indexOf(key)
    if (i > -1) shown.splice(i, 1)

    if (typeof lfRestoreBubble === 'function') lfRestoreBubble(key)
  }

  function minimize(key) {
    const c = document.getElementById('card-' + key)
    if (!c) return
    c.style.display = 'none'
    const d = CARDS[key]
    const chip = document.createElement('button')
    chip.className = 'tray-chip'
    chip.setAttribute('data-key', key)
    chip.type = 'button'
    chip.innerHTML = '<span class="d"></span>' + esc(d.title)
    chip.addEventListener('click', function () {
      c.style.display = ''
      chip.remove()
    })
    tray.appendChild(chip)
  }

  function closeAll() {
    shown.slice().forEach(function (k) {
      const c = document.getElementById('card-' + k)
      if (c && c.parentNode) c.parentNode.removeChild(c)
    })
    tray.innerHTML = ''
    shown.length = 0
    fieldTop.style.display = 'none'
    if (typeof lfRestoreAllBubbles === 'function') lfRestoreAllBubbles()
  }

  function logLine(key, cls, html) {
    const log = document.getElementById('log-' + key)
    if (!log) return
    const el = document.createElement('div')
    el.className = 'logline ' + cls
    el.innerHTML = html
    log.appendChild(el)
  }

  async function sendMsg(key) {
    const card = document.getElementById('card-' + key)
    if (!card) return
    const rcpt = card.querySelector('select').value
    const inp = card.querySelector('.composer input')
    const sendBtn = card.querySelector('.composer .send')
    const msg = inp.value.trim()
    if (!msg) return

    logLine(key, 'you', '<b>Вы → <span class="to">' + esc(rcpt) + '</span>:</b> ' + esc(msg))
    inp.value = ''
    if (sendBtn) sendBtn.disabled = true

    const cardTitle = CARDS[key]?.title || key
    const cardContext = '[Карточка: ' + cardTitle + '] '
    const routed = rcpt === R
      ? cardContext + msg
      : cardContext + '[→ ' + rcpt + '] ' + msg

    const groupContext = key === 'arrivals'
      ? (pulseCache?.portals || portalsCache || []).find(function (p) {
        return p.checkIn === todayIso() && p.status !== 'cancelled'
      })
      : null

    const cardSpecificContext = {
      currentCard: cardTitle,
      ...(groupContext ? {
        activeGroup: {
          name: groupContext.groupName || groupContext.title,
          guests: groupContext.totalGuests,
          checkIn: groupContext.checkIn,
          checkOut: groupContext.checkOut,
          rooming: findRoomingList(groupContext)
        }
      } : {})
    }

    try {
      const json = await apiPost('/api/rita-chat', {
        message: rcpt === R ? ('[Карточка: ' + cardTitle + '] ' + msg) : routed,
        history: [],
        liveData: Object.assign({}, buildLiveContext(), cardSpecificContext)
      })
      logLine(key, 'rita', '<b>Рита:</b> ' + esc(json.reply || 'Приняла.'))
      if (card) {
        card.classList.add('has-log', 'expanded')
        card.scrollIntoView({behavior: 'smooth', block: 'nearest'})
        if (json.reply && json.reply.length > 200) {
          card.style.width = Math.min(520, window.innerWidth * 0.4) + 'px'
        }
      }
    } catch (err) {
      logLine(key, 'rita', '<b>Рита:</b> ' + esc('Ошибка — ' + err.message))
    } finally {
      if (sendBtn) sendBtn.disabled = false
      inp.focus()
    }
  }

  function openPanel() {
    document.body.setAttribute('data-panel', 'open')
  }

  function closePanel() {
    document.body.setAttribute('data-panel', 'closed')
  }

  function addChatMsg(cls, html) {
    const el = document.createElement('div')
    el.className = cls
    el.innerHTML = html
    chatArea.appendChild(el)
    chatArea.scrollTop = chatArea.scrollHeight
    return el
  }

  function restoreChatHistory() {
    if (!chatHistory.length) return
    // render saved messages into chatArea (skip the default greeting)
    chatArea.innerHTML = ''
    chatHistory.forEach(function(m) {
      const cls = m.role === 'rita' ? 'msg-rita' : 'msg-you'
      const html = m.role === 'rita'
        ? '<b>Рита:</b> ' + esc(m.content)
        : esc(m.content)
      const el = document.createElement('div')
      el.className = cls
      el.innerHTML = html
      chatArea.appendChild(el)
    })
    chatArea.scrollTop = chatArea.scrollHeight
  }

  function showChatTyping() {
    const el = addChatMsg('msg-rita', '<b>Рита:</b> ···')
    el.id = 'chatTyping'
    return el
  }

  function hideChatTyping() {
    document.getElementById('chatTyping')?.remove()
  }

  function buildLiveContext() {
    if (!pulseCache) return {}
    const p = pulseCache

    const unitDetails = (p.places || [])
      .filter(function (pl) { return pl.type === 'accommodation' && pl.bedrooms })
      .map(function (pl) {
        const beds = (pl.bedrooms || []).map(function (b) {
          const parts = []
          if (b.kingBeds) parts.push(b.kingBeds + ' king')
          if (b.queenBeds) parts.push(b.queenBeds + ' queen')
          if (b.twinBeds) parts.push(b.twinBeds + ' twin' + (b.twinCanConvertToKing ? ' (convertible)' : ''))
          if (b.bunkBeds) parts.push(b.bunkBeds + ' bunk')
          return b.label + ': ' + parts.join(', ')
        }).join('; ')
        return pl.unitCode + ': ' + beds + ', sleeps ' + pl.capacity + (pl.livingRoomSleeps ? ' (+' + pl.livingRoomSleeps + ' sofa)' : '')
      })

    const buildings = (p.places || [])
      .filter(function (pl) { return pl.type === 'building' })
      .sort(function (a, b) { return (a.buildingNumber || 0) - (b.buildingNumber || 0) })
      .map(function (b) {
        return 'Building ' + b.buildingNumber + ' (' + (b.suiteCategory || '') + ')'
      })

    const sharedSpaces = (p.places || [])
      .filter(function (pl) {
        return ['restaurant', 'bar', 'outdoor-area', 'practice-space', 'event-space', 'pool'].indexOf(pl.type) > -1
      })
      .map(function (pl) {
        return pl.name + ' (' + pl.type + ')' + (pl.capacity ? ' · вместимость ' + pl.capacity : '')
      })

    return {
      property: 'Las Canas Beach Retreat',
      balanceStatus: p.pulse?.balanceStatus || null,
      coherenceStatement: p.pulse?.coherenceStatement || null,
      buildings: buildings,
      sharedSpaces: sharedSpaces,
      unitDetails: unitDetails,
      openConcernsCount: (p.openConcerns || []).length,
      openConcerns: (p.openConcerns || []).map(function (c) {
        return {
          place: c.place?.name || c.place?.unitCode || 'unknown',
          summary: c.summary,
          openedAt: c.openedAt
        }
      }),
      people: (p.people || []).map(function (person) {
        return {
          name: person.name,
          role: person.role,
          department: person.department?.titleEn || null
        }
      }),
      responsibilities: (p.responsibilities || []).map(function (r) {
        return {
          domain: r.title,
          authority: r.authorityLevel,
          holder: r.holder?.name || null
        }
      }),
      upcomingGroups: (p.portals || []).map(function (g) {
        return {
          name: g.groupName || g.title,
          checkIn: g.checkIn,
          checkOut: g.checkOut,
          guests: g.totalGuests,
          category: g.categoryName?.name || null
        }
      }),
      roomingLists: (p.roomingLists || []).map(function (r) {
        return {
          groupId: r.groupId,
          dates: r.stayDateStart + ' → ' + r.stayDateEnd,
          guests: r.totalOccupants,
          rooms: (r.rooms || []).map(function (rm) {
            return 'Room ' + rm.roomNumber + ' (' + rm.roomType + '): ' +
              (rm.occupants || []).map(function (o) { return o.name }).join(', ')
          }).join(' | ')
        }
      }),
      openQuestions: (p.openQuestions || []).map(function (q) { return q.question })
    }
  }

  let pendingPdfData = null
  let pendingPdfName = null

  async function sendChat() {
    const inp = document.getElementById('panelInput')
    const sendBtn = document.getElementById('panelSend')
    const msg = inp.value.trim()
    if (!msg && !pendingPdfData) return

    chatHistory.push({role: 'user', content: msg})
    addChatMsg('msg-you', esc(msg))
    saveChatHistory()
    inp.value = ''
    inp.style.height = 'auto'
    if (sendBtn) sendBtn.disabled = true
    showChatTyping()

    const recentHistory = chatHistory
      .slice(0, -1)
      .slice(-6)
      .map((m) => ({role: m.role === 'rita' ? 'rita' : 'user', content: m.content}))
      .filter((m) => m.content && m.content.trim().length > 0)

    try {
      const hasPdf = Boolean(pendingPdfData)

      let json
      if (hasPdf) {
        // PDF goes to dedicated upload-rooming endpoint — lighter, no liveData
        const pdfRes = await fetch('/api/upload-rooming', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': 'Bearer ' + STAFF_KEY
          },
          body: JSON.stringify({
            pdfData: pendingPdfData,
            fileName: pendingPdfName || 'rooming.pdf',
            groupHint: msg || ''
          })
        })
        const pdfData = await pdfRes.json().catch(() => ({}))
        if (!pdfRes.ok) {
          throw new Error(pdfData.error || ('HTTP ' + pdfRes.status))
        }
        if (pdfData.ok) {
          json = { reply: '✅ Руминг сохранён в базу. Группа: ' + (pdfData.groupName || '?') + ' · ' + (pdfData.totalRooms || '?') + ' комнат · ' + (pdfData.totalGuests || '?') + ' гостей.' }
        } else if (pdfData.unmatched) {
          json = { reply: '⚠️ Группа не найдена автоматически. ' + (pdfData.message || 'Укажи Prod ID группы.') }
        } else {
          throw new Error(pdfData.error || 'Ошибка обработки PDF')
        }
        // save clean message to history (not empty)
        const pdfMsgForHistory = msg || 'Загрузил руминг-лист'
        chatHistory.push({role: 'user', content: pdfMsgForHistory})
        chatHistory.push({role: 'rita', content: json.reply})
        saveChatHistory()
        // clear PDF
        pendingPdfData = null
        pendingPdfName = null
        const badge = document.getElementById('pdfBadge')
        const attachBtn = document.getElementById('panelAttach')
        if (badge) { badge.style.display = 'none'; badge.textContent = '' }
        if (attachBtn) attachBtn.classList.remove('has-file')
        const fileInput = document.getElementById('panelFile')
        if (fileInput) fileInput.value = ''
      } else {
        json = await apiPost('/api/rita-chat', {
          message: msg,
          history: recentHistory,
          liveData: buildLiveContext()
        })
      }
      hideChatTyping()
      const reply = json.reply || 'Приняла.'
      chatHistory.push({role: 'rita', content: reply})
      addChatMsg('msg-rita', '<b>Рита:</b> ' + esc(reply))

        let fy = 0
        zones.forEach(function (z) {
          const ddx = b.px - z.cx
          const ddy = b.py - z.cy
          const dist = Math.sqrt(ddx * ddx + ddy * ddy) || 1
          const repR = z.r + half + 16
          if (dist < repR) {
            const ov = repR - dist
            fx += (ddx / dist) * ov * 1.4
            fy += (ddy / dist) * ov * 1.4
          }
        })
        const dhx = b.homeX - b.px
        const dhy = b.homeY - b.py
        if (Math.sqrt(dhx * dhx + dhy * dhy) > 2) {
          fx += dhx * 0.04
          fy += dhy * 0.04
        }
        b.vx = (b.vx + fx) * 0.78
        b.vy = (b.vy + fy) * 0.78
        b.px += b.vx
        b.py += b.vy
        b.px = Math.max(mg, Math.min(b.px, vw - mg))
        b.py = Math.max(mg, Math.min(b.py, vh - mg - 40))
        b.el.style.left = (b.px + fdx - half) + 'px'
        b.el.style.top = (b.py + fdy - half) + 'px'
        drawBubble(b.cv, b, animT, false)
      }
      requestAnimationFrame(tick)
    }

    function makeDraggable(el, onClick) {
      let ox = 0
      let oy = 0
      let on = false
      let moved = false
      el.addEventListener('mousedown', function (e) {
        moved = false
        on = true
        ox = e.clientX - el.getBoundingClientRect().left
        oy = e.clientY - el.getBoundingClientRect().top
        el.classList.add('lf-dragging')
        e.preventDefault()
      })
      document.addEventListener('mousemove', function (e) {
        if (!on) return
        moved = true
        const vw = window.innerWidth
        const vh = window.innerHeight
        const w = el.offsetWidth
        const h = el.offsetHeight
        let nx = e.clientX - ox
        let ny = e.clientY - oy
        nx = Math.max(8, Math.min(nx, vw - w - 8))
        ny = Math.max(8, Math.min(ny, vh - h - 8))
        el.style.position = 'fixed'
        el.style.right = 'auto'
        el.style.bottom = 'auto'
        el.style.left = nx + 'px'
        el.style.top = ny + 'px'
      })
      document.addEventListener('mouseup', function () {
        if (on && !moved && onClick) onClick()
        on = false
        el.classList.remove('lf-dragging')
      })
    }

    const summonBtn = document.getElementById('summon')
    if (summonBtn) {
      summonBtn.style.zIndex = '110'
      makeDraggable(summonBtn, function () {
        document.body.getAttribute('data-panel') === 'open' ? closePanel() : openPanel()
      })
    }

    initBubbles(MOCK_BUBBLES)
    requestAnimationFrame(tick)
    loadPulseData().catch(function () {})
  })()

  // PDF attach button
  const panelAttachBtn = document.getElementById('panelAttach')
  const panelFileInput = document.getElementById('panelFile')
  const pdfBadgeEl = document.getElementById('pdfBadge')

  if (panelAttachBtn && panelFileInput) {
    panelAttachBtn.addEventListener('click', function() {
      panelFileInput.click()
    })
    panelFileInput.addEventListener('change', function() {
      const file = panelFileInput.files[0]
      if (!file) return
      const reader = new FileReader()
      reader.onload = function(e) {
        // extract base64 (remove data:...;base64, prefix)
        pendingPdfData = e.target.result.split(',')[1]
        pendingPdfName = file.name
        panelAttachBtn.classList.add('has-file')
        if (pdfBadgeEl) {
          pdfBadgeEl.textContent = file.name.slice(0, 20)
          pdfBadgeEl.style.display = 'inline-block'
        }
      }
      reader.readAsDataURL(file)
    })
  }

  // Restore chat history from localStorage
  restoreChatHistory()

  document.getElementById('closePanel').addEventListener('click', closePanel)
  document.getElementById('panelSend').addEventListener('click', sendChat)
  const panelInputEl = document.getElementById('panelInput')
  panelInputEl.addEventListener('input', function () {
    this.style.height = 'auto'
    this.style.height = Math.min(this.scrollHeight, 140) + 'px'
  })
  panelInputEl.addEventListener('keydown', function (e) {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault()
      sendChat()
    }
    // Shift+Enter = new line
  })


  loadPortalsData().catch(function () {})
})()
</script>
</body>
</html>
