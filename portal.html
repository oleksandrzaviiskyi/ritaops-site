<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Las Canas — портал группы</title>
    <style>
      :root {
        --bg: #f6f1e8;
        --card: #fff;
        --accent: #1a4d5c;
        --border: #d8cfc0;
        --ok: #2d7a4f;
      }
      body {
        font-family: system-ui, sans-serif;
        background: var(--bg);
        margin: 0;
        padding: 1.5rem;
        color: #1c2b2f;
      }
      .box {
        max-width: 420px;
        margin: 0 auto;
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 12px;
        padding: 1.5rem;
      }
      h1 {
        font-size: 1.25rem;
        color: var(--accent);
        margin: 0 0 1rem;
      }
      label {
        display: block;
        font-size: 0.85rem;
        font-weight: 600;
        margin: 0.75rem 0 0.35rem;
        color: #5a6b70;
      }
      input {
        width: 100%;
        padding: 0.55rem;
        border: 1px solid var(--border);
        border-radius: 8px;
        font: inherit;
        box-sizing: border-box;
      }
      button {
        margin-top: 1.25rem;
        width: 100%;
        padding: 0.7rem;
        background: var(--accent);
        color: #fff;
        border: none;
        border-radius: 8px;
        font: inherit;
        font-weight: 600;
        cursor: pointer;
      }
      button:disabled {
        opacity: 0.6;
        cursor: wait;
      }
      .success {
        margin-top: 1rem;
        padding: 0.75rem;
        background: #e8f5ec;
        color: var(--ok);
        border-radius: 8px;
        display: none;
      }
      .success.show {
        display: block;
      }
      .error {
        margin-top: 1rem;
        padding: 0.75rem;
        background: #fde8e4;
        color: #c45c3e;
        border-radius: 8px;
        display: none;
      }
      .error.show {
        display: block;
      }
      .hint {
        font-size: 0.8rem;
        color: #5a6b70;
        margin-top: 1rem;
      }
    </style>
  </head>
  <body>
    <div class="box">
      <h1>Данные группы</h1>
      <form id="form">
        <label for="groupName">Название группы</label>
        <input id="groupName" name="groupName" type="text" required />

        <label for="checkIn">Дата заезда</label>
        <input id="checkIn" name="checkIn" type="date" />

        <label for="checkOut">Дата выезда</label>
        <input id="checkOut" name="checkOut" type="date" />

        <label for="totalGuests">Количество гостей</label>
        <input id="totalGuests" name="totalGuests" type="number" min="1" required />

        <button type="submit" id="submitBtn">Сохранить</button>
      </form>

      <p id="success" class="success" role="status">Данные сохранены</p>
      <p id="error" class="error" role="alert"></p>

      <p class="hint" id="hint"></p>
    </div>

    <script>
      // ── Настройки Sanity (ваш проект) ─────────────────────────────
      const SANITY = {
        projectId: '0po0panc',
        dataset: 'production',
        apiVersion: '2025-05-20'
      }

      // Ссылка организатора: /portal.html?slug=demo-portal-2026&token=ВАШ_СЕКРЕТ
      const params = new URLSearchParams(location.search)
      const slug = params.get('slug')
      const accessToken = params.get('token')

      const form = document.getElementById('form')
      const successEl = document.getElementById('success')
      const errorEl = document.getElementById('error')
      const hintEl = document.getElementById('hint')
      const submitBtn = document.getElementById('submitBtn')

      hintEl.textContent = slug
        ? 'Портал: ' + slug
        : 'Добавьте в URL: ?slug=…&token=… (из npm run portal:create)'

      function showError(msg) {
        errorEl.textContent = msg
        errorEl.classList.add('show')
        successEl.classList.remove('show')
      }

      function showSuccess() {
        successEl.classList.add('show')
        errorEl.classList.remove('show')
      }

      /** Загрузка из Sanity (публичное чтение) */
      async function loadPortal() {
        if (!slug || !accessToken) return

        const query = encodeURIComponent(
          `*[_type == "groupPortal" && portalSlug.current == $slug][0]{ groupName, checkIn, checkOut, totalGuests, portalAccessToken }`
        )
        const url =
          `https://${SANITY.projectId}.api.sanity.io/v${SANITY.apiVersion}/data/query/${SANITY.dataset}?query=${query}&$slug="${slug}"`

        const res = await fetch(url)
        const json = await res.json()
        const doc = json.result

        if (!doc || doc.portalAccessToken !== accessToken) {
          showError('Портал не найден или неверная ссылка')
          submitBtn.disabled = true
          return
        }

        form.groupName.value = doc.groupName || ''
        form.checkIn.value = doc.checkIn || ''
        form.checkOut.value = doc.checkOut || ''
        form.totalGuests.value = doc.totalGuests ?? ''
      }

      /**
       * Сохранение через API (токен write только на сервере).
       * Запуск: SANITY_API_WRITE_TOKEN=… npm run portal:dev
       * Открыть: http://localhost:8787/portal.html?slug=…&token=…
       */
      async function savePortal(event) {
        event.preventDefault()
        successEl.classList.remove('show')
        errorEl.classList.remove('show')

        if (!slug || !accessToken) {
          showError('Нужны параметры slug и token в адресе страницы')
          return
        }

        const data = {
          groupName: form.groupName.value.trim(),
          checkIn: form.checkIn.value || null,
          checkOut: form.checkOut.value || null,
          totalGuests: Number(form.totalGuests.value),
          adults: Number(form.totalGuests.value)
        }

        submitBtn.disabled = true

        try {
          const res = await fetch('/api/portal', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({slug, token: accessToken, data})
          })
          const json = await res.json()

          if (!res.ok) {
            showError(
              json.error ||
                'Не удалось сохранить. Запустите сервер: SANITY_API_WRITE_TOKEN=… npm run portal:dev'
            )
            return
          }

          showSuccess()
        } catch (e) {
          showError(
            'Нет связи с сервером. Откройте страницу через npm run portal:dev (не как файл file://).'
          )
        } finally {
          submitBtn.disabled = false
        }
      }

      form.addEventListener('submit', savePortal)
      loadPortal()
    </script>
  </body>
</html>
