<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>LCBR — Группы (дашборд)</title>
    <link rel="stylesheet" href="/portal.css" />
  </head>
  <body>
    <header>
      <div class="wrap wide">
        <h1>Групповые порталы</h1>
        <p>Las Canas Beach Retreat — прогресс заполнения организаторами</p>
      </div>
    </header>

    <div class="wrap wide">
      <div class="card">
        <p id="meta" style="margin: 0; color: var(--muted)">Загрузка…</p>
        <table>
          <thead>
            <tr>
              <th>Группа</th>
              <th>Заезд</th>
              <th>Гости</th>
              <th>Статус</th>
              <th class="progress-cell">Прогресс</th>
              <th>Ссылка</th>
            </tr>
          </thead>
          <tbody id="rows"></tbody>
        </table>
      </div>
      <p style="font-size: 0.85rem; color: var(--muted)">
        Встраивается на lascanas.puertoplatatech.com в раздел «Группы». Для продакшена задайте
        <code>PORTAL_PUBLIC_BASE_URL</code> (например https://lascanas.com).
      </p>
    </div>

    <script>
      const STATUS_LABELS = {
        new: 'Новый',
        in_progress: 'В процессе',
        menu_done: 'Меню внесено',
        flights_done: 'Рейсы внесены',
        ready: 'Готов к заезду'
      }

      const base =
        window.PORTAL_PUBLIC_BASE_URL ||
        (location.origin.includes('localhost') ? location.origin : 'https://lascanas.com')

      function portalLink(slug, token) {
        if (!slug || !token) return '—'
        const url = `${base}/portal/${encodeURIComponent(slug)}?token=${encodeURIComponent(token)}`
        return `<a class="link-btn" href="${url}" target="_blank" rel="noopener">Открыть</a>`
      }

      function copyLink(slug, token) {
        const url = `${base}/portal/${slug}?token=${token}`
        navigator.clipboard?.writeText(url)
        alert('Ссылка скопирована:\n' + url)
      }

      async function load() {
        const key = new URLSearchParams(location.search).get('key')
        const qs = key ? `?key=${encodeURIComponent(key)}` : ''
        const res = await fetch(`/api/portals${qs}`)
        const {portals} = await res.json()
        document.getElementById('meta').textContent = `Всего порталов: ${portals.length}`
        const tbody = document.getElementById('rows')
        tbody.innerHTML = portals
          .map((p) => {
            const pct = p.progressPercent ?? 0
            return `<tr>
              <td><strong>${p.groupName || p.slug || '—'}</strong></td>
              <td>${p.checkIn || '—'}</td>
              <td>${p.totalGuests ?? '—'}</td>
              <td><span class="badge">${STATUS_LABELS[p.status] || p.status || '—'}</span></td>
              <td class="progress-cell">
                ${pct}%
                <div class="progress-mini"><span style="width:${pct}%"></span></div>
              </td>
              <td>
                ${portalLink(p.slug, p.portalAccessToken)}
                <button type="button" class="btn btn-secondary" style="margin-left:0.5rem;padding:0.25rem 0.5rem;font-size:0.75rem" data-slug="${p.slug}" data-token="${p.portalAccessToken}">Копировать</button>
              </td>
            </tr>`
          })
          .join('')

        tbody.querySelectorAll('button[data-slug]').forEach((btn) => {
          btn.onclick = () => copyLink(btn.dataset.slug, btn.dataset.token)
        })
      }

      load().catch((e) => {
        document.getElementById('meta').textContent = 'Ошибка загрузки: ' + e.message
      })
    </script>
  </body>
</html>
