[build]
  command = "npm install"
  publish = "."
  functions = "netlify/functions"

[[redirects]]
  from = "/portal/*"
  to = "/organizer.html"
  status = 200

[[redirects]]
  from = "/ops"
  to = "/ops.html"
  status = 200

[[redirects]]
  from = "/messages"
  to = "/messages.html"
  status = 200

[[redirects]]
  from = "/login"
  to = "/login.html"
  status = 200

[[redirects]]
  from = "/groups"
  to = "/ops"
  status = 301

[[redirects]]
  from = "/group-portal/lascanasbeachretreat"
  to = "/dashboard.html"
  status = 200

[[redirects]]
  from = "/dashboard"
  to = "/group-portal/lascanasbeachretreat"
  status = 301

[[redirects]]
  from = "/ops/group"
  to = "/ops-group.html"
  status = 200

[[redirects]]
  from = "/api/portal"
  to = "/.netlify/functions/portal"
  status = 200

[[redirects]]
  from = "/api/portals"
  to = "/.netlify/functions/portals"
  status = 200

[[redirects]]
  from = "/api/ops-portal"
  to = "/.netlify/functions/ops-portal"
  status = 200

[[redirects]]
  from = "/join/:code"
  to = "/.netlify/functions/join?code=:code"
  status = 200

[[redirects]]
  from = "/guest/*"
  to = "/guest.html"
  status = 200

[[redirects]]
  from = "/edit/*"
  to = "/edit-guest.html"
  status = 200

[[redirects]]
  from = "/api/guest"
  to = "/.netlify/functions/guest"
  status = 200

[[redirects]]
  from = "/api/create-group"
  to = "/.netlify/functions/create-group"
  status = 200

[[redirects]]
  from = "/api/save-transfers"
  to = "/.netlify/functions/save-transfers"
  status = 200

[[redirects]]
  from = "/api/cancel-group"
  to = "/.netlify/functions/cancel-group"
  status = 200

[[redirects]]
  from = "/api/staff"
  to = "/.netlify/functions/staff"
  status = 200

[[redirects]]
  from = "/api/sanity-all"
  to = "/.netlify/functions/sanity-all"
  status = 200

[[redirects]]
  from = "/api/alex-context"
  to = "/.netlify/functions/alex-context"
  status = 200

[[redirects]]
  from = "/api/rita-chat"
  to = "/.netlify/functions/rita-chat"
  status = 200
  force = true

[[redirects]]
  from = "/api/rita-reflect"
  to = "/.netlify/functions/rita-reflect"
  status = 200
  force = true

[[redirects]]
  from = "/api/request-edit"
  to = "/.netlify/functions/request-edit"
  status = 200

[[redirects]]
  from = "/api/edit-guest"
  to = "/.netlify/functions/edit-guest"
  status = 200
